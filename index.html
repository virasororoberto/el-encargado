<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>EL ENCARGADO · Feria del Litoral</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--az:#0a1628;--az2:#16284a;--az3:#1f3a6b;--do:#f5b932;--do2:#d4a01e;--co:#ff6b6b;--ve:#4ecdc4;--gr:#94a3b8;--bg:#f8fafc;--tx:#0f172a}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0a1628,#16284a);color:var(--tx);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}

@media (min-width:900px){
  body{padding:20px}
  .app{max-width:1300px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);min-height:calc(100vh - 40px)}
  .login{min-height:calc(100vh - 40px);border-radius:24px}
  .content-pc{display:grid;grid-template-columns:260px 1fr;gap:0}
  .sidebar-pc{background:var(--az);color:#fff;padding:16px 12px;min-height:calc(100vh - 130px);max-height:calc(100vh - 130px);overflow-y:auto}
  .sb-group{margin-bottom:14px}
  .sb-title{font-size:9px;color:rgba(245,185,50,.7);letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px 4px;font-weight:700}
  .sb-item{padding:10px 12px;border-radius:10px;margin-bottom:2px;color:rgba(255,255,255,.7);font-size:13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
  .sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .sb-item.active{background:var(--do);color:var(--az);font-weight:700}
  .sb-item.logout{margin-top:14px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px;color:#fda4af}
  .sb-item.logout:hover{background:rgba(255,107,107,.15);color:#fecaca}
  .sb-item .ic{font-size:16px}
  .nav.mobile{display:none!important}
  .content{padding:24px 28px;padding-bottom:30px}
  .kpis{grid-template-columns:repeat(4,1fr)!important}
  .actions{grid-template-columns:repeat(4,1fr)!important}
  .ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .detail-row{padding:12px 0}
}
/* Monitor ancho (full HD horizontal y más) */
@media(min-width:1500px){
  .app{max-width:1700px}
}
/* Monitor ultra-ancho (21:9, 34"+): usar prácticamente todo el ancho */
@media(min-width:1900px){
  body{padding:15px}
  .app{max-width:none;width:calc(100vw - 30px);margin:0}
  .content-pc{grid-template-columns:280px 1fr}
}
@media (max-width:899px){
  .content-pc{display:block}
  .sidebar-pc{display:none}
  .nav.mobile{display:flex!important}
}

.login{min-height:100vh;padding:32px 24px;background:linear-gradient(135deg,#0a1628,#1f3a6b);color:#fff;display:flex;flex-direction:column;justify-content:center}
.login-brand{text-align:center;margin-bottom:40px}
.login-brand .logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,var(--do),var(--do2));display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--az);margin-bottom:16px;box-shadow:0 12px 40px rgba(245,185,50,.4)}
.login-brand h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--do);margin-bottom:4px}
.login-brand p{font-size:13px;opacity:.7;letter-spacing:1.5px;text-transform:uppercase}
.login-version{font-size:10px;opacity:.4;margin-top:8px;font-family:'JetBrains Mono',monospace}
.login-form{display:flex;flex-direction:column;gap:14px;max-width:400px;width:100%;margin:0 auto}
.login-form input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:16px 20px;border-radius:14px;font-size:16px;font-family:'DM Sans',sans-serif;outline:none}
.login-form input::placeholder{color:rgba(255,255,255,.4)}
.login-form input:focus{border-color:var(--do)}
.login-form button{background:linear-gradient(135deg,var(--do),var(--do2));color:var(--az);border:none;padding:18px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-top:6px}
.login-error{background:rgba(255,107,107,.15);border:1px solid var(--co);padding:12px;border-radius:10px;font-size:13px;text-align:center}
.login-users{margin-top:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,.1);text-align:center;max-width:400px;margin:24px auto 0}
.login-users-title{font-size:11px;opacity:.5;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.login-users-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;font-size:11px;opacity:.6}
.login-user-chip{padding:4px 10px;background:rgba(255,255,255,.06);border-radius:8px;font-family:'JetBrains Mono',monospace}

.header{background:linear-gradient(135deg,var(--az),var(--az2));color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.header-info h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;color:var(--do);line-height:1}
.header-info p{font-size:11px;opacity:.7;margin-top:2px}
.header-user{display:flex;align-items:center;gap:10px;font-size:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--do);color:var(--az);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ve);margin-right:4px}
.conn-dot.off{background:var(--co)}

.content{padding:20px;padding-bottom:100px;min-height:calc(100vh - 75px)}
.greet{margin-bottom:20px}
.greet h2{font-size:22px;font-weight:700;color:var(--az);line-height:1.2}
.greet p{font-size:13px;color:var(--gr);margin-top:4px}

.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid #e2e8f0}
.kpi-label{font-size:10px;color:var(--gr);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--az);letter-spacing:1px}
.kpi-sub{font-size:11px;color:var(--gr);margin-top:4px}
.kpi.do{background:linear-gradient(135deg,var(--do),var(--do2));border:none}
.kpi.do .kpi-label,.kpi.do .kpi-value,.kpi.do .kpi-sub{color:var(--az)}
.kpi.co{background:linear-gradient(135deg,#ff6b6b,#ee5a52);border:none;color:#fff}
.kpi.co .kpi-label,.kpi.co .kpi-value,.kpi.co .kpi-sub{color:#fff}

.section{margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;color:var(--az);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.section-title .badge{background:var(--co);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.section-title .badge.ve{background:var(--ve)}
.section-title .badge.do{background:var(--do);color:var(--az)}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.2s}
.action:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.action .icon{font-size:24px;margin-bottom:6px}
.action .label{font-size:12px;font-weight:600;color:var(--az)}
.action.primary{background:var(--az);color:#fff;border-color:var(--az)}
.action.primary .label{color:#fff}

.alert{background:#fff;border-left:4px solid var(--co);padding:14px;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.alert-title{font-size:13px;font-weight:700;color:var(--az);margin-bottom:4px}
.alert-text{font-size:12px;color:var(--gr)}
.alert.ve{border-left-color:var(--ve)}
.alert.do{border-left-color:var(--do)}

.lc{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0;cursor:pointer;transition:.2s}
.lc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.lc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lc-n{font-size:14px;font-weight:700;color:var(--az)}
.lc-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gr)}
.lc-d{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--co);letter-spacing:1px}
.lc-d.ok{color:var(--ve)}
.lc-m{display:flex;gap:8px;font-size:11px;color:var(--gr);margin-top:6px;flex-wrap:wrap}
.lc-m span{background:#f1f5f9;padding:2px 8px;border-radius:6px}

.detail{background:#fff;border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.detail h3{font-size:16px;color:var(--az);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--gr)}
.detail-value{font-size:13px;font-weight:600;color:var(--az);font-family:'JetBrains Mono',monospace}
.detail-value.co{color:var(--co)}
.detail-value.ve{color:var(--ve)}
.detail-value.big{font-size:20px}

.promo-box{background:linear-gradient(135deg,#fef3c7,#fde68a);padding:14px;border-radius:12px;font-size:13px;line-height:1.6;color:#78350f;white-space:pre-wrap}
.promo-empty{background:#f1f5f9;padding:20px;border-radius:12px;text-align:center;font-size:13px;color:var(--gr)}
.cat-box{background:#f0fdf4;padding:14px;border-radius:12px;font-size:13px;line-height:1.6;color:#14532d;white-space:pre-wrap}

.search{background:#fff;padding:14px;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:14px}
.search input{width:100%;border:none;outline:none;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--az)}

.btn{background:var(--az);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;font-family:'DM Sans',sans-serif}
.btn.co{background:var(--co)}
.btn.ve{background:var(--ve)}
.btn.do{background:var(--do);color:var(--az)}
.btn.ol{background:#fff;color:var(--az);border:1px solid var(--az)}
.btn.wa{background:#25D366;color:#fff;text-decoration:none;display:block;text-align:center}
.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.btn-row .btn{margin-top:0;padding:12px;font-size:12px}

.mn{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0}
.mn-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mn-n{font-size:14px;font-weight:700;color:var(--az)}
.mn-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gr)}
.mn-d{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--co)}
.mn-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-amable{background:#d1fae5;color:#065f46}
.tag-firme{background:#fef3c7;color:#92400e}
.tag-final{background:#fee2e2;color:#991b1b}

.chat-msgs{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;min-height:300px;max-height:50vh;overflow-y:auto}
.msg{padding:10px 12px;border-radius:12px;margin-bottom:8px;font-size:13px;line-height:1.5}
.msg.user{background:var(--az);color:#fff;margin-left:30px}
.msg.ai{background:#f1f5f9;color:var(--az);margin-right:30px}
.chat-in{background:#fff;padding:10px;border-radius:14px;display:flex;gap:8px}
.chat-in input{flex:1;border:1px solid #e2e8f0;padding:10px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.chat-in button{background:var(--do);color:var(--az);border:none;padding:0 16px;border-radius:10px;font-weight:700;cursor:pointer}
.chat-quick{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px;flex-wrap:wrap}
.chat-quick-btn{background:#fff;border:1px solid #e2e8f0;padding:8px 12px;border-radius:10px;font-size:11px;white-space:nowrap;cursor:pointer;color:var(--az)}

.nav.mobile{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:8px 0 12px;z-index:80}
.nav.mobile .nav-item{flex:1;text-align:center;padding:6px;cursor:pointer;color:var(--gr);font-size:10px}
.nav.mobile .nav-item.active{color:var(--az)}
.nav.mobile .nav-item .nav-icon{font-size:20px;display:block;margin-bottom:2px}

.loading{text-align:center;padding:40px 20px;color:var(--gr)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:var(--az);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--az);color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.co{background:var(--co)}
.toast.ve{background:var(--ve)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:24px 20px;transform:translateY(100%);transition:.3s;max-height:90vh;overflow-y:auto;position:relative}
.modal-overlay.show .modal{transform:translateY(0)}
@media(min-width:900px){.modal-overlay{align-items:center}.modal{border-radius:20px;max-width:500px}}
.modal h3{font-size:18px;color:var(--az);margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px}
.modal input,.modal select,.modal textarea{width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* === MODO PC: solo aprovechar el ancho, sin agrandar textos === */
/* Los tamaños base ya funcionan bien para PC, no necesitamos cambiarlos */

/* Botón hamburguesa (solo móvil) */
.burger{display:none;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;margin-right:10px}
.header-left{display:flex;align-items:center}
@media(max-width:899px){.burger{display:inline-flex}}
@media(min-width:900px){.burger{display:none!important}}

/* Panel menú completo (drawer) */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:160;opacity:0;pointer-events:none;transition:.25s}
.drawer-ov.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;height:100%;width:82%;max-width:320px;background:var(--az);color:#fff;z-index:170;transform:translateX(-100%);transition:.3s;overflow-y:auto;padding:18px 14px;box-shadow:4px 0 30px rgba(0,0,0,.3)}
.drawer-ov.show .drawer{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.12)}
.drawer-head h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--do)}
.drawer-head .x{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
.drawer .sb-group{margin-bottom:14px}
.drawer .sb-title{font-size:9px;color:rgba(245,185,50,.7);letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px 4px;font-weight:700}
.drawer .sb-item{padding:13px 12px;border-radius:10px;margin-bottom:2px;color:rgba(255,255,255,.8);font-size:15px;display:flex;align-items:center;gap:12px;cursor:pointer}
.drawer .sb-item:active{background:rgba(255,255,255,.1)}
.drawer .sb-item.active{background:var(--do);color:var(--az);font-weight:700}
.drawer .sb-item.logout{margin-top:14px;border-top:1px solid rgba(255,255,255,.12);padding-top:14px;color:#fda4af}
.drawer .sb-item .ic{font-size:18px}

/* === SORTEOS · Pantalla LIVE === */
.sorteo-live{position:fixed;inset:0;background:linear-gradient(135deg,#0a1628 0%,#1f3a6b 50%,#0a1628 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;text-align:center;overflow:hidden}
.sorteo-live::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%, rgba(245,185,50,.15), transparent 50%), radial-gradient(circle at 80% 70%, rgba(255,107,107,.12), transparent 50%);pointer-events:none}
.sorteo-live-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10}
.sorteo-live-brand{font-family:'Bebas Neue','DejaVu Sans Condensed',sans-serif;font-size:36px;color:var(--do);letter-spacing:4px;margin-bottom:4px;text-shadow:0 2px 20px rgba(245,185,50,.4)}
.sorteo-live-titulo{font-size:18px;color:rgba(255,255,255,.8);letter-spacing:2px;text-transform:uppercase;margin-bottom:30px}
.sorteo-live-flyer{max-width:280px;max-height:280px;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.5);margin-bottom:30px;border:4px solid var(--do)}
.sorteo-live-ruleta{font-family:'Bebas Neue','DejaVu Sans Condensed',sans-serif;font-size:clamp(40px,8vw,90px);font-weight:700;color:var(--do);letter-spacing:2px;text-shadow:0 4px 30px rgba(245,185,50,.6);min-height:120px;display:flex;align-items:center;justify-content:center;padding:0 20px;word-break:break-all;transition:transform .05s}
.sorteo-live-ganador{font-family:'Bebas Neue','DejaVu Sans Condensed',sans-serif;font-size:clamp(50px,10vw,120px);color:var(--ve);letter-spacing:3px;text-shadow:0 4px 40px rgba(78,205,196,.8);animation:ganadorPop .6s ease-out;padding:0 20px;word-break:break-all}
@keyframes ganadorPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
.sorteo-live-label{font-size:14px;color:rgba(255,255,255,.7);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.sorteo-live-stats{position:absolute;bottom:20px;left:20px;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}
.sorteo-live-lista{margin-top:30px;display:flex;flex-direction:column;gap:8px;max-width:600px;width:90%}
.sorteo-live-lista-item{background:rgba(255,255,255,.08);border:1px solid rgba(245,185,50,.3);border-radius:12px;padding:12px 18px;font-family:'Bebas Neue','DejaVu Sans Condensed',sans-serif;font-size:22px;color:#fff;letter-spacing:1.5px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:slideIn .4s ease-out}
.sorteo-live-lista-item.suplente{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:18px}
.sorteo-live-lista-item .pos{background:var(--do);color:var(--az);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.sorteo-live-lista-item.suplente .pos{background:rgba(255,255,255,.15);color:#fff}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.sorteo-live-acciones{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.sorteo-live-btn{background:var(--do);color:var(--az);border:none;padding:12px 22px;border-radius:30px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase}

async function apiPost(accion, body={}) {

// === REFRESCO AUTOMÁTICO ===
// Cada 5 minutos, si estamos en una pantalla de SOLO LECTURA, no hay modal abierto y
// el usuario no está escribiendo en un input, refrescamos la pantalla actual.
const PANTALLAS_AUTOREFRESH = {
  inicio:    'rInicio',
  caja:      'rCaja',
  locales:   'rLocales'
};

function iniciarAutoRefresh(){
  if(window._autoRefreshTimer) return; // ya iniciado
  window._autoRefreshTimer = setInterval(()=>{
    try{
      // No refrescar si no hay usuario logueado
      if(!state.user) return;
      // No refrescar si hay modal abierto
      if(document.querySelector('.modal-overlay.show, .drawer-ov.show')) return;
      // No refrescar si el usuario está escribiendo en un input/textarea/contenteditable
      const act = document.activeElement;
      if(act && (act.tagName==='INPUT' || act.tagName==='TEXTAREA' || act.tagName==='SELECT' || act.isContentEditable)) return;
      // Solo si la pantalla actual es de lectura
      const fn = PANTALLAS_AUTOREFRESH[state.view];
      if(!fn || typeof window[fn]!=='function') return;
      // No refrescar si está cargando ya (spinner activo)
      if(document.querySelector('.spinner')) return;
      // Refrescar silenciosamente
      window[fn]();
    }catch(e){/* nunca dejamos que un error rompa el timer */}
  }, 5 * 60 * 1000); // 5 minutos
}

function guardarYAbrirMusica(){
  const url = (document.getElementById('musUrl')?.value||'').trim();
  if(!url){toast('Pegá un link','co');return;}
  if(!/^https?:\/\//.test(url)){toast('El link tiene que empezar con http(s)://','co');return;}
  setPlaylistMusica(url);

async function confirmCambiar() {
  const local = document.getElementById('ciLocal').value;

  const nuevaClave = document.getElementById('ciClave').checked;
  const condonarDeuda = document.getElementById('ciCondonar').checked;
  if(!nombreNuevo){toast('Falta el nombre','co');return;}
  if(!confirm(`¿Confirmás cambiar el local ${local} a "${nombreNuevo}"?${condonarDeuda?'\n\n⚠️ Se va a condonar la deuda actual.':''}`))return;
  toast('Procesando...');
  const r = await apiPost('cambiar_inquilino',{local:Number(local),nombreNuevo,alquilerNuevo:alq,nuevaClave,condonarDeuda,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Inquilino cambiado','ve');state.data.alquileres=[];setTimeout(()=>rLocales(),800);}
  else toast('Error: '+r.error,'co');
}

// Ver detalle de movimientos (con rango de fechas + 2 columnas + imprimir)
function fechaHoyISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isoADMY(iso){ if(!iso)return ''; const p=iso.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso; }
function dmyAISO(dmy){ if(!dmy)return fechaHoyISO(); const p=String(dmy).split('/'); return p.length===3?`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`:fechaHoyISO(); }
function fechaDeltaDMY(dias){
  const d=new Date(); d.setDate(d.getDate()+dias);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function primerDiaMesDMY(){
  const d=new Date();
  return `01/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function aplicarRangoMov(){
  const isoD = document.getElementById('movDesde').value;
  const isoH = document.getElementById('movHasta').value;
  if(!isoD){toast('Elegí fecha desde','co');return;}
  if(!isoH){ verDetalleDia(isoADMY(isoD)); return; }
  if(isoH < isoD){toast('La fecha "hasta" debe ser posterior a "desde"','co');return;}
  if(isoH === isoD){ verDetalleDia(isoADMY(isoD)); return; }
  verDetalleDia(isoADMY(isoD), isoADMY(isoH));
}
// Compatibilidad con código viejo que llamaba aplicarFechaMov
function aplicarFechaMov(){ aplicarRangoMov(); }

  const r = await apiPost('abrir_caja',{efectivoContado,observacion,cargadoPor:state.user.name});
  if(r.ok){
    let msg = `✓ Caja abierta. Sistema: ${money(r.saldo_sistema)}. `;

// Muestra la diferencia en tiempo real mientras se tipea el efectivo contado
function mostrarDifEnCierre(teorico){
  const v = parseFloat(document.getElementById('ccEfec').value);
  const prev = document.getElementById('ccDifPreview');
  if(!prev) return;
  if(isNaN(v)||v<0){prev.innerHTML='';return;}
  const dif = v - teorico;
  if(dif===0){
    prev.innerHTML = `<span style="background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:10px;font-weight:700">✓ CUADRA EXACTO</span>`;
  } else if(dif>0){
    prev.innerHTML = `<span style="background:#dbeafe;color:#1e40af;padding:4px 10px;border-radius:10px;font-weight:700">🟢 Sobran ${money(dif)}</span>`;
  } else {
    prev.innerHTML = `<span style="background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:10px;font-weight:700">🔴 Faltan ${money(Math.abs(dif))}</span>`;
  }
}

// Generar el texto del ticket (también se usa para compartir WhatsApp)
function ticketCierreTexto(c){
  const dif = Number(c.DIFERENCIA)||0;
  const signoDif = dif===0?'CUADRA':(dif>0?'sobra '+money(dif):'falta '+money(Math.abs(dif)));
  const lineas = [
    '*FERIA DEL LITORAL*',
    '*Cierre de Caja*',
    '─────────────',
    `📅 Fecha: ${c.FECHA||'-'}`,
    `👤 Apertura: ${c.OPERADOR_APERTURA||'-'}`,
    `👤 Cierre: ${c.OPERADOR_CIERRE||'-'}`,
    '─────────────',
    `🔓 Apertura: ${money(c.EFECTIVO_APERTURA)}`,
    `⬆ Ingresos (efectivo): ${money(c.INGRESOS_EFECTIVO||c.TOTAL_INGRESOS)}`,
    `⬇ Egresos (efectivo): ${money(c.EGRESOS_EFECTIVO||c.TOTAL_EGRESOS)}`,
    `🔒 Saldo teórico: ${money(c.SALDO_TEORICO)}`,
    `💵 Efectivo contado: ${money(c.EFECTIVO_CONTADO)}`,
    '─────────────',
    `📊 Diferencia: ${signoDif}`,
    c.MOTIVO_DIFERENCIA ? `📝 Motivo: ${c.MOTIVO_DIFERENCIA}` : '',
    '─────────────',
    `📈 ${c.CANTIDAD_PAGOS||0} pagos · ${c.CANTIDAD_GASTOS||0} gastos${c.CANTIDAD_RETIROS?' · '+c.CANTIDAD_RETIROS+' retiros':''}`,
    c.OBSERVACION ? `💬 ${c.OBSERVACION}` : ''
  ].filter(x=>x);
  return lineas.join('\n');
}

// Convertir dd/MM/yyyy a yyyy-MM-dd para input type="date"
function fechaParaInput(f){
  if(!f)return '';
  if(f.includes('-'))return f;
  const p = f.split('/');
  if(p.length===3)return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return '';
}

async function confCargarContrato(num){
  const nombre = document.getElementById('ctNombre').value.trim();
  const link = document.getElementById('ctLink').value.trim();
  const fechaInicio = document.getElementById('ctIni').value;
  const fechaVenc = document.getElementById('ctVenc').value;

// Modal ajuste manual (acepta campo preseleccionado: 'CAJA' o 'BANCO APROX')

  const sel = campoPre || 'CAJA';

  const opciones = ['CAJA','BANCO APROX','TOTAL GENERAL']
    .map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');

    <div class="alert do" style="margin-bottom:14px"><div class="alert-text">${esBanco?'Ingresá el saldo real del banco (BANCO APROX). Queda registrado en AUDITORIA.':'Usalo para correcciones puntuales. Para arqueo de efectivo diario, usá Cierre de caja. Queda en AUDITORIA.'}</div></div>

    <select id="acCampo">${opciones}</select>

async function confAjusteCaja(){
  const campo = document.getElementById('acCampo').value;
  const nuevoSaldo = parseFloat(document.getElementById('acMonto').value);
  const motivo = document.getElementById('acMotivo').value.trim();
  if(isNaN(nuevoSaldo)||!motivo){toast('Completá monto y motivo','co');return;}
  if(!confirm(`¿Confirmás ajustar ${campo} a ${money(nuevoSaldo)}?\n\nMotivo: ${motivo}`))return;
  const r = await apiPost('ajustar_caja',{campo,nuevoSaldo,motivo,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Caja ajustada','ve');cerrarModal();setTimeout(()=>rCaja(),500);}
  else toast('Error: '+r.error,'co');
}

  const cobradoMes = Number((state.data.caja||{})['COBRADO MES']||0) || (state.data.alquileres||[]).reduce((s,a)=>s+(Number(a.PAGADO)||0),0);
  const esperadoMes = (state.data.alquileres||[]).reduce((s,a)=>s+(Number(a['ALQUILER ACTUAL'])||0),0);
  const totalFijos = (state._gastosFijos||[]).reduce((s,x)=>s+x.monto_total,0);
  const totalFijosPagados = (state._gastosFijos||[]).reduce((s,x)=>s+x.monto_pagado,0);
  const totalFijosResta = Math.max(0, totalFijos - totalFijosPagados);
  const gananciaEsperada = esperadoMes - totalFijos;
  const gananciaReal = cobradoMes - totalFijosPagados;
  
  const totalGastosCargados = g.reduce((s,x)=>s+(Number(x.MONTO||0)),0);
  const cantAnulados = g.filter(x=>Number(x.MONTO||0)<0 || /ANULADO/i.test(x.DETALLE||'') || /ANULADO/i.test(x.OBSERVACION||'')).length;
  
  render(`
    <div class="greet"><h2>📉 Gastos</h2><p>Presupuesto del mes y gastos reales</p></div>
    
    <!-- BLOQUE PRESUPUESTO -->
    <div class="detail" style="background:linear-gradient(135deg,#0a1628 0%,#1f3a6b 100%);color:#fff;padding:20px;margin-bottom:14px">
      <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--do);font-weight:700;margin-bottom:12px;text-align:center">💰 PRESUPUESTO DEL MES</div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div style="background:rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:10px;color:rgba(255,255,255,.6);letter-spacing:1px;text-transform:uppercase">Cobranza esperada</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--do);letter-spacing:1.5px;margin-top:4px">${money(esperadoMes)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.5)">Cobrado: ${money(cobradoMes)}</div>
        </div>
        <div style="background:rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:10px;color:rgba(255,255,255,.6);letter-spacing:1px;text-transform:uppercase">Gastos fijos</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--co);letter-spacing:1.5px;margin-top:4px">${money(totalFijos)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.5)">Pagado: ${money(totalFijosPagados)} · Resta: ${money(totalFijosResta)}</div>
        </div>
      </div>
      
      <div style="background:${gananciaEsperada>=0?'rgba(78,205,196,.18)':'rgba(255,107,107,.18)'};border:2px solid ${gananciaEsperada>=0?'var(--ve)':'var(--co)'};border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:11px;color:rgba(255,255,255,.8);letter-spacing:2px;text-transform:uppercase;font-weight:700">🎯 Ganancia estimada</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;color:${gananciaEsperada>=0?'var(--ve)':'var(--co)'};letter-spacing:2px;line-height:1;margin-top:4px">${gananciaEsperada>=0?'+':''}${money(gananciaEsperada)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:6px">Esperado − Gastos fijos · Real al día de hoy: ${gananciaReal>=0?'+':''}${money(gananciaReal)}</div>
      </div>
    </div>
    
    <!-- LISTA DE GASTOS FIJOS (sin agrupar) -->
    <div class="section" style="margin-top:14px">
      <div class="section-title">📋 Gastos fijos del mes <span class="badge">${(state._gastosFijos||[]).length}</span></div>
      
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn ve" style="margin-top:0;flex:1;min-width:130px" onclick="modAgregarFijo()">+ Agregar fijo</button>
        <button class="btn ol" style="margin-top:0;flex:1;min-width:130px" onclick="confirmarResetFijos()">🔄 Resetear mes</button>
      </div>
      
      ${(state._gastosFijos||[]).length===0 ? `<div class="alert"><div class="alert-text">No hay gastos fijos cargados. Tocá "+ Agregar fijo" para empezar.</div></div>` : ''}
      
      ${(state._gastosFijos||[]).map(gf=>{
        const pct = gf.monto_total>0 ? Math.min(100, (gf.monto_pagado/gf.monto_total)*100) : 0;
        const completo = gf.completado;
        const colorBarra = completo ? 'var(--ve)' : (pct>0?'#fbbf24':'#cbd5e1');
        return `<div class="lc" style="margin-bottom:6px;${completo?'background:#ecfdf5;border-left:3px solid var(--ve)':(pct>0?'background:#fffbeb;border-left:3px solid #fbbf24':'')}">
          <div class="lc-h">
            <div style="flex:1;cursor:pointer" onclick="modEditarFijo('${gf.id}')">
              <div class="lc-n" style="${completo?'text-decoration:line-through;opacity:.7':''}">${completo?'✓ ':''}${escapeHTML(gf.descripcion)}</div>
              <div class="lc-num">Pagado: <b style="color:${completo?'var(--ve)':'var(--az)'}">${money(gf.monto_pagado)}</b> / ${money(gf.monto_total)}${gf.monto_resta>0?` · resta <b style="color:var(--co)">${money(gf.monto_resta)}</b>`:''}</div>
              <div style="height:6px;background:#e2e8f0;border-radius:3px;margin-top:4px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${colorBarra};transition:width .3s"></div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:10px">
              <button class="btn ${completo?'ol':'ve'}" style="margin-top:0;padding:6px 10px;font-size:11px;width:auto;white-space:nowrap" onclick="modPagarFijo('${gf.id}')">${completo?'✓ Completo':'+ Pagar'}</button>
              ${gf.monto_pagado>0?`<button class="btn ol" style="margin-top:0;padding:4px 8px;font-size:10px;width:auto;color:var(--co);border-color:#fecaca" onclick="confDespagarFijo('${gf.id}')">↶ Deshacer</button>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    
    <!-- BOTÓN CARGAR GASTO REAL -->
    <button class="btn co" onclick="modGasto()" style="margin-top:14px">+ Cargar gasto</button>
    
    <!-- LISTA DE GASTOS REALES CARGADOS -->
    <div class="section" style="margin-top:14px">
      <div class="section-title">🧾 Últimos gastos cargados <span class="badge">${g.length}</span></div>
      <div style="font-size:12px;color:var(--gr);margin-bottom:8px">Total neto: <b>${money(totalGastosCargados)}</b>${cantAnulados?' · '+cantAnulados+' anulación(es)':''}</div>
      
      ${g.length===0 ? `<div class="alert"><div class="alert-text">No hay gastos cargados todavía este período.</div></div>` : ''}
      ${g.slice().reverse().map((x,idxRev)=>{
        const idxReal = g.length - 1 - idxRev;
        const monto = Number(x.MONTO||0);
        const esAnulado = monto < 0 || /^ANULADO:/i.test(x.OBSERVACION||'') || /^ANULADO:/i.test(x.DETALLE||'');
        if(esAnulado){
          return `<div class="lc" style="background:#fef2f2;border-left:3px solid var(--co);opacity:.85">
            <div class="lc-h">
              <div style="flex:1">
                <div class="lc-n" style="color:#991b1b">✗ ${escapeHTML(x.DETALLE||x.OBSERVACION||'Anulación')}</div>
                <div class="lc-num">${fechaCorta(x.FECHA)} · ${x.METODO||''}</div>
              </div>
              <div style="text-align:right">
                <div class="lc-d" style="color:var(--co)">${money(monto)}</div>
                <button class="btn ol" style="margin-top:4px;padding:5px 8px;font-size:11px;width:auto;background:#7f1d1d;color:#fff;border-color:#7f1d1d" onclick="modBorrarGastoDef(${idxReal})" title="Borrar de la planilla para siempre">🗑️ Borrar</button>
              </div>
            </div>
          </div>`;
        }
        return `<div class="lc">
          <div class="lc-h">
            <div style="flex:1">
              <div class="lc-n">${escapeHTML(x.DETALLE||'Sin detalle')}</div>
              <div class="lc-num">${fechaCorta(x.FECHA)} · ${x.METODO||''}${x.CODIGO?' · cód '+x.CODIGO:''}</div>
            </div>
            <div style="text-align:right">
              <div class="lc-d">${money(monto)}</div>
              <div style="display:flex;gap:4px;margin-top:4px;justify-content:flex-end">
                <button class="btn ol" style="margin-top:0;padding:5px 8px;font-size:11px;width:auto;color:var(--co);border-color:#fecaca" onclick="modAnularGasto(${idxReal})">✗ Anular</button>
                <button class="btn ol" style="margin-top:0;padding:5px 8px;font-size:11px;width:auto;background:#7f1d1d;color:#fff;border-color:#7f1d1d" onclick="modBorrarGastoDef(${idxReal})" title="Borrar de la planilla para siempre">🗑️</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `);
}

async function confAgregarFijo(){
  const categoria = document.getElementById('fCat').value;
  const descripcion = (document.getElementById('fDesc').value||'').trim();
  const monto = parseFloat(document.getElementById('fMonto').value)||0;
  const notas = (document.getElementById('fNotas').value||'').trim();
  if(!descripcion){toast('Poné una descripción','co');return;}

  if(r.ok){toast('✓ Agregado','ve');cerrarModal();rGastos();}
  else toast('Error: '+r.error,'co');
}

function modEditarFijo(id){

  modal(`

    <select id="fCat">
      ${['ELECTRICIDAD','LIMPIEZA','MANTENIMIENTO','SUELDOS','SEGURIDAD','MARKETING','FERRETERIA','SORTEO/PREMIO','OTROS'].map(c=>`<option ${c===gf.categoria?'selected':''}>${c}</option>`).join('')}
    </select>

    <div style="background:#f8fafc;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:var(--gr)">Ya pagaste: <b style="color:var(--ve)">${money(gf.monto_pagado)}</b>${gf.monto_resta>0?' · Resta: <b style="color:var(--co)">'+money(gf.monto_resta)+'</b>':' · Completo'}</div>

async function confEditarFijo(id){
  const categoria = document.getElementById('fCat').value;
  const descripcion = (document.getElementById('fDesc').value||'').trim();

async function confBorrarFijo(id){

  if(r.ok){toast('✓ Eliminado','ve');cerrarModal();rGastos();}
  else toast('Error: '+r.error,'co');

// Modal de PAGO PARCIAL: pide cuánto pagar, fecha, método, y si tocar caja o solo marcar
function modPagarFijo(id){
  const gf = (state._gastosFijos||[]).find(x=>x.id===id);
  if(!gf){toast('No encontrado','co');return;}
  const sugerido = gf.monto_resta>0 ? gf.monto_resta : gf.monto_total;
  // Fecha de hoy en formato yyyy-MM-dd
  const hoy = new Date();
  const fechaHoy = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
  modal(`
    <h3>+ Registrar pago</h3>
    <div style="font-size:13px;color:var(--gr);margin-bottom:6px"><b style="color:var(--az);font-size:14px">${escapeHTML(gf.descripcion)}</b></div>
    <div style="background:#f8fafc;border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px">
      <div>Total estimado: <b>${money(gf.monto_total)}</b></div>
      <div>Ya pagado: <b style="color:var(--ve)">${money(gf.monto_pagado)}</b></div>
      ${gf.monto_resta>0?`<div>Resta: <b style="color:var(--co)">${money(gf.monto_resta)}</b></div>`:'<div style="color:var(--ve)">✓ Ya está completo, pero podés cargar más si pagaste de más</div>'}
    </div>
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px">¿Cuánto vas a pagar ahora?</label>
    <input type="number" id="pgMonto" value="${sugerido}" placeholder="Ej: ${sugerido}">
    <div style="display:flex;gap:6px;margin-top:6px">
      ${gf.monto_resta>0?`<button class="btn ol" style="margin-top:0;padding:6px;font-size:11px;flex:1" onclick="document.getElementById('pgMonto').value=${gf.monto_resta}">Total restante</button>`:''}
      <button class="btn ol" style="margin-top:0;padding:6px;font-size:11px;flex:1" onclick="document.getElementById('pgMonto').value=${Math.round(sugerido/2)}">Mitad</button>
    </div>
    
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px;margin-top:10px">📅 Fecha del pago</label>
    <input type="date" id="pgFecha" value="${fechaHoy}" max="${fechaHoy}">
    
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px;margin-top:10px">Método de pago</label>
    <select id="pgMet">
      <option value="EFECTIVO">EFECTIVO</option>
      <option value="TRANSFERENCIA">TRANSFERENCIA</option>
      <option value="BANCO">BANCO</option>
      <option value="__YA_EN_CAJA__" style="color:#78350f;font-weight:700">⚠️ YA ESTÁ EN CAJA (no mover)</option>
    </select>
    <div id="pgAvisoYaEnCaja" style="display:none;background:#fef3c7;border-left:3px solid var(--do);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:#78350f">
      Este pago solo va a sumar al gasto fijo. NO va a tocar la caja ni cargar gasto nuevo. Útil si ya cargaste el movimiento antes a mano.
    </div>
    
    <button class="btn ve" style="margin-top:14px" onclick="confPagoParcial('${id}')">✓ Confirmar pago</button>
  `);
  // Aviso al cambiar a "YA ESTÁ EN CAJA"
  setTimeout(()=>{
    const sel = document.getElementById('pgMet');
    if(sel) sel.addEventListener('change', ()=>{
      const av = document.getElementById('pgAvisoYaEnCaja');
      if(av) av.style.display = (sel.value==='__YA_EN_CAJA__'?'block':'none');
    });
  }, 100);
}

async function confPagoParcial(id){
  const monto = parseFloat(document.getElementById('pgMonto').value);
  const metodoSel = document.getElementById('pgMet').value;
  const fecha = document.getElementById('pgFecha').value;
  const soloMarcar = (metodoSel === '__YA_EN_CAJA__');
  const metodo = soloMarcar ? 'EFECTIVO' : metodoSel;
  if(isNaN(monto)||monto<=0){toast('Monto inválido','co');return;}
  
  // Anti-doble-click: bloquear el botón mientras procesa
  const btns = document.querySelectorAll('button[onclick^="confPagoParcial"]');
  btns.forEach(b=>{b.disabled=true; b.style.opacity='.5'; b.style.pointerEvents='none'; b.innerHTML='⏳ Procesando...';});
  
  try {
    const r = await apiPost('gastos_fijos_pagar_parcial',{
      id, montoPago:monto, metodo, fecha, soloMarcar,
      cargadoPor:state.user.name
    });
    if(r.ok){
      toast(soloMarcar?'✓ Marcado (sin tocar caja)':'✓ Pago registrado','ve');
      cerrarModal();
      rGastos();
    } else {
      btns.forEach(b=>{b.disabled=false; b.style.opacity='1'; b.style.pointerEvents='auto'; b.innerHTML='✓ Confirmar pago';});
      toast('Error: '+r.error,'co');
    }
  } catch(err) {
    btns.forEach(b=>{b.disabled=false; b.style.opacity='1'; b.style.pointerEvents='auto'; b.innerHTML='✓ Confirmar pago';});
    toast('Error de red: '+err.message,'co');
  }
}

async function confDespagarFijo(id){
  const gf = (state._gastosFijos||[]).find(x=>x.id===id);
  if(!gf)return;
  if(!confirm(`¿Deshacer los pagos de "${gf.descripcion}"? Esto vuelve "pagado" a $0. No borra los gastos ya cargados en la planilla GASTOS.`))return;
  const r = await apiPost('gastos_fijos_despagar',{id,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Deshecho','ve');rGastos();}
  else toast('Error: '+r.error,'co');
}

async function confirmarResetFijos(){
  if(!confirm('¿Resetear TODOS los pagos de gastos fijos a $0? Esto es para arrancar un mes nuevo. Los gastos ya cargados en la planilla GASTOS no se ven afectados.'))return;
  const r = await apiPost('gastos_fijos_reset_mes',{cargadoPor:state.user.name});
  if(r.ok){toast('✓ '+r.mensaje,'ve');rGastos();}
  else toast('Error: '+r.error,'co');
}

// Modal para anular gasto (registra una compensación negativa con motivo)
function modAnularGasto(idx){
  const g = (state._gastos||[])[idx];
  if(!g){toast('Gasto no encontrado','co');return;}
  modal(`
    <h3>✗ Anular gasto</h3>
    <div class="alert" style="margin-bottom:14px;background:#fef2f2;border-left:4px solid var(--co)">
      <div class="alert-text">
        <b>Vas a anular:</b><br>
        ${escapeHTML(g.DETALLE||'Sin detalle')}<br>
        ${money(Number(g.MONTO||0))} · ${fechaCorta(g.FECHA)} · ${g.METODO||''}
      </div>
    </div>
    <div class="alert do" style="margin-bottom:14px">
      <div class="alert-text" style="font-size:12px">No se borra el gasto original (queda en la planilla por auditoría). Se carga una <b>anulación compensatoria</b> con el monto en negativo. Queda registrado quién la hizo y el motivo.</div>
    </div>
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px">Motivo de la anulación (obligatorio)</label>
    <textarea id="anulMotivo" rows="3" placeholder="Ej: gasto cargado por error, monto incorrecto, no se entregó..." style="width:100%;padding:11px;border:1px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:14px;outline:none;resize:vertical;box-sizing:border-box"></textarea>
    <button class="btn co" onclick="confAnularGasto(${idx})" style="margin-top:14px">✗ Confirmar anulación</button>
  `);
}

async function confAnularGasto(idx){
  const g = (state._gastos||[])[idx];
  const motivo = (document.getElementById('anulMotivo')?.value||'').trim();
  if(!motivo){toast('Tenés que escribir el motivo','co');return;}
  if(motivo.length<5){toast('El motivo es muy corto, sé más específico','co');return;}
  
  // Bloqueo anti-doble-click: deshabilitar el botón mientras procesa
  const btns = document.querySelectorAll('button[onclick^="confAnularGasto"]');

  // Anti-doble-click

async function confRetiro(){
  const sel = document.getElementById('rQuien').value;
  if(!sel){toast('Elegí quién retira','co');return;}
  let nombre, codigo;
  if(sel==='OTRO'){
    const t = (document.getElementById('rOtroTxt').value||'').trim();
    if(!t){toast('Escribí el nombre o código','co');return;}
    // Si tiene formato "NOMBRE · CODIGO" o "NOMBRE CODIGO", lo parseo, si no uso el texto entero
    const m = t.match(/^(.+?)[\s·\|]+(\d{2,6})$/);
    if(m){nombre = m[1].trim().toUpperCase(); codigo = m[2];}
    else {nombre = t.toUpperCase(); codigo = t.toUpperCase();}
  } else {
    const partes = sel.split('|');
    nombre = partes[0]; codigo = partes[1];
  }
  const monto = parseFloat(document.getElementById('rMonto').value);
  if(isNaN(monto)||monto<=0){toast('Monto inválido','co');return;}
  const motivo = (document.getElementById('rMotivo').value||'').trim();
  if(!confirm(`¿Confirmás retiro de ${money(monto)} por ${nombre}? Se va a descontar de caja.`))return;
  toast('Registrando retiro...');
  const r = await apiPost('cargar_retiro',{nombre,monto,codigo,motivo,cargadoPor:state.user.name});
  if(r.ok){
    toast('✓ Retiro cargado','ve');
    cerrarModal();
    setTimeout(()=>rCaja(),400);
  } else toast('Error: '+(r.error||'desconocido'),'co');
}

// Arma un resumen compacto de la feria para que la IA tenga contexto
function construirContextoIA(){
  const al = state.data.alquileres||[];
  const mor = (state.data.morosos||[]).slice(0,15);
  const caja = state.data.caja||{};
  const tA = al.reduce((s,a)=>s+(Number(a['ALQUILER ACTUAL'])||0),0);
  const tP = al.reduce((s,a)=>s+(Number(a.PAGADO)||0),0);
  const dT = (state.data.morosos||[]).reduce((s,m)=>s+(Number(m['DEUDA TOTAL'])||0),0);
  const alDia = al.filter(a=>a.NOMBRE && Number(a['DEUDA TOTAL']||0)===0).length;
  const activos = al.filter(a=>a.NOMBRE).length;
  const lineasMor = mor.map((m,i)=>`${i+1}. Local ${m.LOCAL} - ${m.NOMBRE}: debe ${money(m['DEUDA TOTAL'])}`).join('\n');
  const cajaTxt = Object.keys(caja).map(k=>`${k}: ${typeof caja[k]==='number'?money(caja[k]):caja[k]}`).join(', ');
  return `DATOS ACTUALES DE FERIA DEL LITORAL (${new Date().toLocaleDateString('es-AR')}):
- Locales activos: ${activos}. Al día (sin deuda): ${alDia}. Con deuda: ${(state.data.morosos||[]).length}.
- Cobranza del mes: cobrado ${money(tP)} de ${money(tA)} esperado (${tA>0?Math.round(tP/tA*100):0}% de cumplimiento).
- Deuda total acumulada: ${money(dT)}.
- Caja: ${cajaTxt||'sin datos'}.
- Top morosos:
${lineasMor||'sin datos'}`;
}

      // Fallback: si no hay API key configurada o falla, uso respuestas locales
      const motivo = (r.error||'').toLowerCase().includes('api key') ? '' : ` <em style="font-size:10px;opacity:.6">(modo offline)</em>`;
      respuesta = (await respLoc(t.toLowerCase())) + motivo;
    }
  }catch(e){
    respuesta = await respLoc(t.toLowerCase());
  }

  const think=document.getElementById(pid);
  if(think)think.remove();
  state.chat.push({role:'ai',text:respuesta});
  m.innerHTML+=`<div class="msg ai">${respuesta}</div>`;
  m.scrollTop=m.scrollHeight;
}

// Fallback local (se usa solo si el backend no responde o no hay API key)
async function respLoc(q) {
  if(!state.data.morosos.length)await cargarDatosBase();
  if(q.includes('moroso')||q.includes('debe')){const t=state.data.morosos.slice(0,5);return '🚨 <b>Top 5 morosos:</b><br><br>'+t.map((m,i)=>`${i+1}. <b>${m.NOMBRE}</b><br>   ${money(m['DEUDA TOTAL'])}`).join('<br><br>');}
  if(q.includes('cobra')||q.includes('mes')){const tp=state.data.alquileres.reduce((s,a)=>s+(Number(a.PAGADO)||0),0);const ta=state.data.alquileres.reduce((s,a)=>s+(Number(a['ALQUILER ACTUAL'])||0),0);return `💰 <b>Cobranza:</b><br>Cobrado: ${money(tp)}<br>Esperado: ${money(ta)}<br>Cumplimiento: <b>${ta>0?Math.round(tp/ta*100):0}%</b>`;}
  if(q.includes('caja')){if(!state.data.caja)return 'No hay datos';return '💵 <b>Caja:</b><br>'+Object.keys(state.data.caja).map(k=>`${k}: <b>${typeof state.data.caja[k]==='number'?money(state.data.caja[k]):state.data.caja[k]}</b>`).join('<br>');}
  if(q.includes('día')||q.includes('dia')){const ad=state.data.alquileres.filter(a=>a.NOMBRE&&Number(a['DEUDA TOTAL']||0)===0);return `✅ <b>${ad.length} al día:</b><br><br>`+ad.slice(0,10).map(l=>`• ${l.NOMBRE}`).join('<br>');}
  if(q.includes('promo')){const r=await apiGet('locales_sin_promo');if(r.ok)return `🎯 <b>Promos:</b><br>Con promo: ${r.total_con||0}<br>Sin promo: ${r.total_sin||0}<br><br>Andá a la sección Promos para ver el detalle.`;}
  return 'Probá las preguntas rápidas de arriba 🤖';
}

// === HELPER WHATSAPP: arma el link en el navegador para que los emojis vayan bien codificados ===
// El backend (Apps Script) tiene problemas con emojis al codificar.
// Esta función agarra el mensaje en texto plano y arma el link wa.me en el navegador, que sí codifica emojis bien.
function abrirWhatsApp(mensaje, telefono){
  if(!mensaje){toast('Mensaje vacío','co');return;}
  // Limpiar el teléfono (solo dígitos)
  const tel = telefono ? String(telefono).replace(/[^\d]/g,'') : '';
  const base = tel ? `https://wa.me/${tel}` : 'https://wa.me/';
  const url = `${base}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
}

async function notiL(num, plantilla) {
  toast('Generando mensaje...');
  const r = await apiGet('generar_link_whatsapp',{local:num,plantilla,operador:state.user.name});

    toast('WhatsApp abierto','ve');
  } else if(r.ok && r.link){
    // Fallback: si el backend no devolvió el mensaje plano, usar el link del backend
    window.open(r.link,'_blank');
    toast('WhatsApp abierto','ve');
  } else toast(r.error||'Error','co');
}

// ═════════════════════ CALENDARIO DE EVENTOS Y FERIADOS ═════════════════════
function fmtFechaLargaISO(iso){
  if(!iso)return '';
  const p = iso.split('-');
  if(p.length!==3)return iso;
  const d = new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} ${d.getFullYear()}`;
}
function diasFaltanISO(iso){
  if(!iso)return null;
  const p = iso.split('-');
  if(p.length!==3)return null;
  const f = new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); f.setHours(0,0,0,0);
  const h = new Date(); h.setHours(0,0,0,0);
  return Math.floor((f - h)/(1000*60*60*24));
}

async function rCalendario(){
  state.view='calendario'; loading('Cargando calendario...');
  const r = await apiGet('calendario_listar');
  if(!r.ok){render(`<div class="greet"><h2>📅 Calendario</h2></div><div class="alert"><div class="alert-text">${r.error}</div></div>`);return;}
  state._calendario = r.data || [];

  // Filtrar: futuros (próximos) + opción de ver pasados
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const proximos = [], pasados = [];
  r.data.forEach(e=>{
    const dias = diasFaltanISO(e.fecha);
    if(dias===null) return;
    const item = {...e, dias};
    if(dias>=0) proximos.push(item); else pasados.push(item);
  });
  proximos.sort((a,b)=>a.dias-b.dias);
  pasados.sort((a,b)=>b.dias-a.dias);

  // Agrupar próximos en buckets
  const urgentes = proximos.filter(e=>e.dias<=7);
  const cercanos = proximos.filter(e=>e.dias>7 && e.dias<=20);
  const lejanos  = proximos.filter(e=>e.dias>20 && e.dias<=90);
  const masLejos = proximos.filter(e=>e.dias>90);

  const cardEvento = (e)=>{
    const esFeriado = e.tipo==='feriado';
    const colorBorde = e.dias<=7 ? 'var(--co)' : (e.dias<=20 ? 'var(--do)' : '#e2e8f0');
    const colorFondo = e.dias<=7 ? '#fef2f2' : (e.dias<=20 ? '#fffbeb' : '#fff');
    const dist = e.dias===0?'¡HOY!':(e.dias===1?'mañana':`en ${e.dias} días`);
    const badge = esFeriado ? '<span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.5px">FERIADO</span>' : '<span style="background:#fef3c7;color:#92400e;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.5px">EVENTO</span>';
    const organizandoBadge = e.organizando ? '<span style="background:#d1fae5;color:#065f46;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.5px">✓ ORGANIZANDO</span>' : '';
    return `<div class="lc" style="cursor:pointer;border:1px solid ${colorBorde};background:${colorFondo}" onclick="abrirEventoCalendario('${e.id}')">
      <div class="lc-h">
        <div style="flex:1">
          <div class="lc-n" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:20px">${e.icono||'📅'}</span> ${e.titulo} ${badge} ${organizandoBadge}</div>
          <div class="lc-num">${fmtFechaLargaISO(e.fecha)} · <b>${dist}</b></div>
          ${e.notas?`<div style="font-size:12px;color:#475569;margin-top:6px;padding:6px 8px;background:rgba(255,255,255,.6);border-radius:6px;border-left:3px solid var(--do)">📝 ${e.notas.substring(0,140)}${e.notas.length>140?'...':''}</div>`:''}
        </div>
        <div style="font-family:'Bebas Neue','DejaVu Sans Condensed',sans-serif;font-size:32px;color:${colorBorde==='#e2e8f0'?'var(--gr)':colorBorde};letter-spacing:1px">${e.dias}d</div>
      </div>
    </div>`;
  };

  render(`
    <div class="greet"><h2>📅 Calendario</h2><p>Eventos comerciales y feriados · ${r.total} totales</p></div>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn do" style="margin-top:0;flex:1;min-width:140px" onclick="modAgregarEvento()">➕ Agregar evento</button>
    </div>

    ${urgentes.length?`<div class="section"><div class="section-title" style="color:var(--co)">🔴 ESTA SEMANA (${urgentes.length})</div>
      ${urgentes.map(cardEvento).join('')}</div>`:''}

    ${cercanos.length?`<div class="section"><div class="section-title" style="color:#d4a01e">🟡 EN LAS PRÓXIMAS 3 SEMANAS (${cercanos.length})</div>
      ${cercanos.map(cardEvento).join('')}</div>`:''}

    ${lejanos.length?`<div class="section"><div class="section-title">⚪ EN LOS PRÓXIMOS 3 MESES (${lejanos.length})</div>
      ${lejanos.map(cardEvento).join('')}</div>`:''}

    ${masLejos.length?`<div class="section"><div class="section-title">📆 MÁS ADELANTE (${masLejos.length})</div>
      ${masLejos.slice(0,15).map(cardEvento).join('')}

// === TEMAS DE REUNIÓN (parseo + render editable) ===
// El campo TEMAS de la planilla es texto plano: cada línea es un tema.
function parsearTemas(textoTemas){
  if(!textoTemas) return [];
  return String(textoTemas).split(/\r?\n/).map(t=>t.trim()).filter(t=>t.length>0)
    .map(t => t.replace(/^[-•*]\s*/,'').trim()); // quitar bullets si los tipearon
}
function serializarTemas(arr){
  return arr.map(t=>String(t).trim()).filter(t=>t.length>0).join('\n');
}
function renderTemasReunion(textoTemas){
  const temas = parsearTemas(textoTemas);
  if(!temas.length) return '<div style="font-size:12px;color:#92400e;font-style:italic;padding:4px 0">Sin temas todavía. Sumá el primero abajo 👇</div>';
  return temas.map((t,i)=>`<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(245,185,50,.25)">
    <div style="flex:1;font-size:13px;color:#78350f">• ${escapeHTML(t)}</div>
    <button onclick="quitarTemaReunion(${i})" style="background:none;border:none;color:#92400e;cursor:pointer;font-size:14px;padding:0 6px;opacity:.6" title="Quitar tema">✕</button>
  </div>`).join('');
}
function escapeHTML(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Agregar tema (estado en memoria + guardar al backend)
async function agregarTemaReunion(reunionId){
  const input = document.getElementById('nuevoTemaTxt');
  const texto = (input?.value||'').trim();
  if(!texto){toast('Escribí el tema','co');return;}
  const re = (state._reuniones||[]).find(x=>x.id===reunionId);
  if(!re){toast('Reunión no encontrada','co');return;}
  const temasArr = parsearTemas(re.temas);
  temasArr.push(texto);
  const nuevoStr = serializarTemas(temasArr);
  // Optimista: actualizo en memoria y UI antes de la respuesta del backend
  re.temas = nuevoStr;
  document.getElementById('temasList').innerHTML = renderTemasReunion(nuevoStr);
  input.value = '';
  input.focus();
  const r = await apiPost('reuniones_actualizar',{id:reunionId, temas:nuevoStr, creadoPor:state.user.name});
  if(!r.ok){toast('Error al guardar: '+r.error,'co');}
}

  // Encontrar la reunión actualmente abierta (la última en state._reuniones que tenga ese tema en su array)
  // Como puede haber varias en _reuniones, la identificamos por la presencia del input nuevoTemaTxt y su contexto
  const input = document.getElementById('nuevoTemaTxt');
  if(!input){toast('No se encontró la reunión','co');return;}
  // Recuperar reunión por el onclick del botón "Sumar objetivo" que tiene el id en su atributo
  const btnSumar = document.querySelector('button[onclick*="agregarObjetivo"]');
  const m = btnSumar ? btnSumar.getAttribute('onclick').match(/'([^']+)'/) : null;
  const reunionId = m ? m[1] : null;
  if(!reunionId){toast('No se pudo identificar la reunión','co');return;}
  const re = (state._reuniones||[]).find(x=>x.id===reunionId);
  if(!re){toast('Reunión no encontrada','co');return;}
  const temasArr = parsearTemas(re.temas);
  if(idx<0 || idx>=temasArr.length){toast('Tema inválido','co');return;}
  if(!confirm(`¿Quitar el tema "${temasArr[idx].substring(0,60)}"?`)) return;
  temasArr.splice(idx,1);
  const nuevoStr = serializarTemas(temasArr);
  re.temas = nuevoStr;
  document.getElementById('temasList').innerHTML = renderTemasReunion(nuevoStr);
  const r = await apiPost('reuniones_actualizar',{id:reunionId, temas:nuevoStr, creadoPor:state.user.name});

}

async function agregarObjetivo(reunionId){
  const texto = (document.getElementById('nuevoObjTxt')?.value||'').trim();
  const responsable = (document.getElementById('nuevoObjResp')?.value||'').trim();
  if(!texto){toast('Escribí el objetivo','co');return;}
  const r = await apiPost('objetivo_agregar',{reunionId,texto,responsable,creadoPor:state.user.name});
  if(r.ok){
    toast('✓ Sumado','ve');
    // Recargar la reunión completa
    const lista = await apiGet('reuniones_listar');
    if(lista.ok){
      state._reuniones = lista.data;
      abrirReunion(reunionId);
    }
  } else toast('Error: '+r.error,'co');
}

async function toggleObjetivo(id, cumplido){
  const r = await apiPost('objetivo_toggle',{id,cumplido,creadoPor:state.user.name});
  if(r.ok){
    toast(cumplido?'✓ Cumplido':'↩ Pendiente',cumplido?'ve':'do');
    // Refrescar el estado en memoria
    const lista = await apiGet('reuniones_listar');
    if(lista.ok){
      state._reuniones = lista.data;
      // Re-renderizar la reunión actual
      const reuActual = lista.data.find(x=>x.objetivos.some(o=>o.id===id));
      if(reuActual) abrirReunion(reuActual.id);
    }
  } else toast('Error: '+r.error,'co');
}

async function eliminarObjetivo(id){
  if(!confirm('¿Eliminar este objetivo?')) return;
  const r = await apiPost('objetivo_borrar',{id,creadoPor:state.user.name});
  if(r.ok){
    toast('✓ Eliminado','ve');
    // Encontrar a qué reunión pertenece (ANTES de borrar de memoria) para reabrirla
    const reuniones = state._reuniones || [];
    const reuPadre = reuniones.find(x=>x.objetivos && x.objetivos.some(o=>o.id===id));
    const reuPadreId = reuPadre?.id;
    // Refrescar lista del backend
    const lista = await apiGet('reuniones_listar');
    if(lista.ok){
      state._reuniones = lista.data;
      if(reuPadreId){
        const re = lista.data.find(x=>x.id===reuPadreId);
        if(re){ abrirReunion(reuPadreId); return; }
      }
    }
    // Si no se pudo, simplemente cerrar el modal y refrescar la lista general
    cerrarModal();
    rReuniones();
  } else toast('Error: '+r.error,'co');
}

  const r = await apiPost('reuniones_actualizar',{id,estado:'cerrada',creadoPor:state.user.name});

// ═════════════════════ SORTEOS ═════════════════════
// Extrae usuarios de un texto pegado de Instagram.
// Detecta DOS tipos:
//   1. Los que comentaron (usando el patrón "Foto del perfil de X" de Instagram, super confiable)
//   2. Los arrobados (@nombre dentro de los comentarios)
// Deduplica para que cada usuario aparezca una sola vez.
function extraerParticipantes(textoCrudo){
  if(!textoCrudo) return [];
  const vistos = new Set();
  const usuarios = [];

  // ── PASO 1: Los arrobados (todos los @ del texto) ─────────────────────────
  const regexArroba = /@([a-zA-Z0-9._]{2,30})/g;
  let m;
  while((m = regexArroba.exec(textoCrudo)) !== null){
    const user = m[1].toLowerCase();
    if(/^[._]+$/.test(user)) continue;
    if(/^\d+$/.test(user)) continue;
    if(vistos.has(user)) continue;
    vistos.add(user);
    usuarios.push(user);
  }

  // ── PASO 2: Los que comentaron, usando el patrón "Foto del perfil de X" ──
  // Instagram, al copiar, mete líneas tipo "Foto del perfil de username" antes
  // del nombre real del comentarista. Eso es 100% confiable.
  // Variantes: "Foto del perfil de", "Profile picture of", "Foto de perfil de"
  const regexFotoPerfil = /(?:foto del perfil de|profile picture of|foto de perfil de)\s+([a-zA-Z0-9._]{2,30})/gi;
  while((m = regexFotoPerfil.exec(textoCrudo)) !== null){
    const user = m[1].toLowerCase();
    if(/^[._]+$/.test(user)) continue;
    if(/^\d+$/.test(user)) continue;
    if(vistos.has(user)) continue;
    vistos.add(user);
    usuarios.push(user);
  }

  // ── PASO 3 (fallback): Por si el copy/paste no tiene "Foto del perfil de" ──
  // Buscamos líneas con solo un username, seguidas de una línea con texto comentario.
  // Esto cubre formatos alternativos de copia.
  const RUIDO = new Set([
    'responder','reply','responder a','reply to',
    'me gusta','like','likes','liked',
    'verificada','verificado','verified',
    'seguir','follow','siguiendo','following','followers','seguidores',
    'ver respuestas','view replies','view reply','ocultar respuestas','hide replies',
    'ver traducción','see translation','traducir','translate','translated','traducido',
    'editado','edited','fijado','pinned','autor','author','autora','anclado',
    'original','más','more','ver más','see more','ver menos','see less',
    'cargar más','load more','antes','before','ahora','now',
    'compartir','share','enviar','send',
    'guardar','save','reportar','report','denunciar','ocultar','hide',
    'sortear','sorteo','feria','feria del litoral','enter','sumar',
    'ig','instagram','facebook','tiktok',
    'comentario','comment','comments','comentarios',
    'publicación','post','publicacion',
    'foto','perfil','del','de','picture','profile','of'
  ]);
  const esFechaTiempo = (s) => {
    const t = s.toLowerCase().trim();
    if(/^\d+\s*(d|h|m|s|min|seg|sem|sg|mes|meses|año|años|día|días|hora|horas|minuto|minutos|segundo|segundos|semana|semanas)\b/.test(t)) return true;
    if(/^hace\s+\d+/.test(t)) return true;
    if(/^\d+\s+(d|h|m|sem|min)\b/.test(t)) return true;
    return false;
  };

  const lineas = String(textoCrudo).split(/\r?\n/);
  for(let i=0; i<lineas.length; i++){
    const linea = lineas[i].trim();
    if(!linea) continue;
    const match = linea.match(/^([a-zA-Z0-9._]{3,30})$/);
    if(!match) continue;
    const candidato = match[1].toLowerCase();
    if(RUIDO.has(candidato)) continue;
    if(esFechaTiempo(candidato)) continue;
    if(/^\d+$/.test(candidato)) continue;
    if(/^[._]+$/.test(candidato)) continue;
    if(vistos.has(candidato)) continue;
    // Verificar que tenga una línea con comentario después
    let pareceComentando = false;
    for(let j=i+1; j<Math.min(i+4, lineas.length); j++){
      const sig = lineas[j].trim();
      if(!sig) continue;
      if(RUIDO.has(sig.toLowerCase())) continue;
      if(esFechaTiempo(sig)) continue;
      if(/^[a-zA-Z0-9._]{3,30}$/.test(sig)) continue;
      if(/^foto del perfil de/i.test(sig)) continue;
      pareceComentando = true;
      break;
    }
    if(!pareceComentando) continue;
    vistos.add(candidato);
    usuarios.push(candidato);
  }

  return usuarios;
}

async function ejecutarSorteoAnimado(){
  const s = state._sorteoEnCurso;
  if(!s) return;
  // Mezclar y separar ganadores + suplentes (Fisher-Yates)
  const arr = [...s.participantes];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  s.resultadoGanadores = arr.slice(0, s.ganadores);
  s.resultadoSuplentes = arr.slice(s.ganadores, s.ganadores + s.suplentes);
  
  // Renderizar pantalla de ruleta
  const ov = document.getElementById('sorteoLiveOv');
  ov.innerHTML = `
    <button class="sorteo-live-close" onclick="cerrarSorteoLive()">✕</button>
    <div class="sorteo-live-brand">🏆 FERIA DEL LITORAL SORTEA 🏆</div>
    <div class="sorteo-live-titulo">${escapeHTML(s.titulo)}</div>
    ${s.flyer ? `<img class="sorteo-live-flyer" src="${s.flyer}" alt="Flyer" style="max-height:160px;max-width:160px">` : ''}
    <div class="sorteo-live-label" id="ruletaLabel">Sorteando ganador 1...</div>
    <div class="sorteo-live-ruleta" id="ruleta">...</div>
    <div class="sorteo-live-lista" id="listaGanadores"></div>
  `;
  
  // Mostrar de a uno con animación
  for(let i=0; i<s.resultadoGanadores.length; i++){
    document.getElementById('ruletaLabel').textContent = `Sorteando ganador ${i+1} de ${s.ganadores}...`;
    await animarRuleta(s.participantes, s.resultadoGanadores[i]);
    agregarAListaLive(i+1, s.resultadoGanadores[i], false);
    await sleep(1000);
  }
  
  // Suplentes
  for(let i=0; i<s.resultadoSuplentes.length; i++){
    document.getElementById('ruletaLabel').textContent = `Sorteando suplente ${i+1} de ${s.suplentes}...`;
    await animarRuleta(s.participantes, s.resultadoSuplentes[i]);
    agregarAListaLive(i+1, s.resultadoSuplentes[i], true);
    await sleep(800);
  }
  
  // Fin: limpiar ruleta y mostrar acciones
  document.getElementById('ruletaLabel').innerHTML = '🎉 ¡SORTEO TERMINADO! 🎉';
  document.getElementById('ruleta').innerHTML = '';
  const listaDiv = document.getElementById('listaGanadores');
  const acciones = document.createElement('div');
  acciones.className = 'sorteo-live-acciones';
  acciones.innerHTML = `
    <button class="sorteo-live-btn" onclick="guardarSorteoEnHistorial()">💾 Guardar en historial</button>
    <button class="sorteo-live-btn sec" onclick="compartirResultadoSorteo()">📱 Compartir</button>
    <button class="sorteo-live-btn sec" onclick="cerrarSorteoLive()">Cerrar</button>
  `;
  listaDiv.parentElement.appendChild(acciones);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function animarRuleta(participantes, ganador){
  const ruleta = document.getElementById('ruleta');
  if(!ruleta) return;
  // Velocidad y duración: arranca rápido, va frenando
  const duracion = 3500; // ms total
  const cambiosInicio = 40; // ms entre cambios al inicio
  const cambiosFin = 250;   // ms entre cambios al final
  const inicio = Date.now();
  
  return new Promise(resolve=>{
    function paso(){
      const t = Date.now() - inicio;
      const progreso = Math.min(t/duracion, 1);
      // Easing: empieza rápido, termina lento (ease-out cuadrático invertido)
      const delay = cambiosInicio + (cambiosFin - cambiosInicio) * Math.pow(progreso, 2);
      if(t < duracion){
        // Nombre random de los participantes
        const randomUser = participantes[Math.floor(Math.random()*participantes.length)];
        ruleta.textContent = '@' + randomUser;
        setTimeout(paso, delay);
      } else {
        // Frenó: mostrar ganador
        ruleta.innerHTML = `<span class="sorteo-live-ganador">@${ganador}</span>`;
        // Esperar a que termine la animación de aparición y resolver
        setTimeout(resolve, 700);
      }
    }
    paso();
  });
}

function pintarComprobantes(){
  const lista = state._comprobantes || [];

  const lf = lista.filter(c=>{

      if(!txt.includes(f.local.toLowerCase())) return false;
    }
    if(f.desde || f.hasta){
      // Parsear fecha (formato dd/MM/yyyy HH:mm o dd/MM/yyyy)
      const m = String(c.fecha||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if(!m) return false;
      const y = parseInt(m[3])<100 ? 2000+parseInt(m[3]) : parseInt(m[3]);
      const fc = new Date(y, parseInt(m[2])-1, parseInt(m[1]));
      if(f.desde){
        const d = new Date(f.desde); d.setHours(0,0,0,0);
        if(fc < d) return false;
      }
      if(f.hasta){
        const d = new Date(f.hasta); d.setHours(23,59,59,999);
        if(fc > d) return false;
      }

    return true;

        </div>

// Convierte URL de Drive a vista directa (thumbnail o uc=view)
function urlComprobanteMiniatura(url){
  if(!url) return '';
  const u = String(url);
  // Drive: extraer ID y usar formato de thumbnail (más confiable para mostrar inline)
  const m = u.match(/[-\w]{25,}/);
  if(/drive\.google\.com|googleusercontent/.test(u) && m){
    return `https://drive.google.com/thumbnail?id=${m[0]}&sz=w400`;
  }
  return u; // si es URL directa, dejamos como está
}
function urlComprobanteVistaCompleta(url){
  if(!url) return '';
  const u = String(url);
  const m = u.match(/[-\w]{25,}/);
  if(/drive\.google\.com|googleusercontent/.test(u) && m){
    return `https://drive.google.com/thumbnail?id=${m[0]}&sz=w1600`;
  }
  return u;
}

function esURLImagen(url){
  if(!url) return false;
  const u = String(url).toLowerCase();
  if(u.includes('drive.google.com') || u.includes('googleusercontent')) return true;
  return /\.(jpg|jpeg|png|gif|webp|heic|bmp)(\?|$)/i.test(u);
}

// Abre una ventana nueva con SOLO el contrato y lanza imprimir. Garantiza que no aparece el menú.
function imprimirContrato(){
  const box = document.getElementById('contratoBox');
  if(!box){toast('No se encontró el contrato','co');return;}
  const w = window.open('','_blank','width=900,height=1000');
  if(!w){toast('Permití pop-ups para imprimir','co');return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contrato Feria del Litoral</title>
    <style>${cssContratoPrint()}</style></head><body>${box.innerHTML}</body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 500);
}

// Descarga el contrato como archivo .doc (Word lo abre perfectamente y se puede seguir editando)
function descargarContratoWord(){
  const box = document.getElementById('contratoBox');
  if(!box){toast('No se encontró el contrato','co');return;}
  // Word abre HTML como documento; usamos el formato MSO para que reconozca correctamente
  const html = `<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><title>Contrato Feria del Litoral</title>
<!--[if gte mso 9]><xml>
  <w:WordDocument>
    <w:View>Print</w:View>
    <w:Zoom>100</w:Zoom>
    <w:DoNotOptimizeForBrowser/>
  </w:WordDocument>
</xml><![endif]-->
<style>${cssContratoPrint()}
/* Para Word, los campos en blanco sin fondo de color */
.campo{border-bottom:1pt solid #000;background:transparent}
</style></head>
<body>${box.innerHTML}</body></html>`;
  const blob = new Blob(['\ufeff'+html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  // Nombre del archivo con fecha
  const hoy = new Date();
  const fechaStr = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = url; a.download = `Contrato_Feria_${fechaStr}.doc`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  toast('✓ Descargando contrato en Word','ve');
}
