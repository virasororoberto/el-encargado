.action{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.2s}

.lc{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0;cursor:pointer;transition:.2s}

.search{background:#fff;padding:14px;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:14px}

.btn{background:var(--az);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;font-family:'DM Sans',sans-serif}
.btn.co{background:var(--co)}
.btn.ve{background:var(--ve)}
.btn.do{background:var(--do);color:var(--az)}
.btn.ol{background:#fff;color:var(--az);border:1px solid var(--az)}
.btn.wa{background:#25D366;color:#fff;text-decoration:none;display:block;text-align:center}
.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.btn-row .btn{margin-top:0;padding:12px;font-size:12px}

.mn{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0}
.mn-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mn-n{font-size:14px;font-weight:700;color:var(--az)}
.mn-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gr)}
.mn-d{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--co)}
.mn-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-amable{background:#d1fae5;color:#065f46}
.tag-firme{background:#fef3c7;color:#92400e}

.chat-msgs{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;min-height:300px;max-height:50vh;overflow-y:auto}

.chat-in{background:#fff;padding:10px;border-radius:14px;display:flex;gap:8px}

.chat-in button{background:var(--do);color:var(--az);border:none;padding:0 16px;border-radius:10px;font-weight:700;cursor:pointer}
.chat-quick{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px;flex-wrap:wrap}
.chat-quick-btn{background:#fff;border:1px solid #e2e8f0;padding:8px 12px;border-radius:10px;font-size:11px;white-space:nowrap;cursor:pointer;color:var(--az)}

.nav.mobile{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:8px 0 12px;z-index:80}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--az);color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:.3s;pointer-events:none}

/* === Movimientos en 2 columnas === */
.mov-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.mov-col{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.mov-col-head{padding:12px 14px;font-size:13px;font-weight:700;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.mov-col-count{background:rgba(255,255,255,.6);border-radius:10px;padding:1px 9px;font-size:12px}
.mov-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:11px 13px;border-bottom:1px solid #f1f5f9}
.mov-row:last-of-type{border-bottom:none}
.mov-row-main{flex:1;min-width:0}
.mov-row-title{font-size:13px;font-weight:600;color:var(--az);word-break:break-word}
.mov-row-sub{font-size:11px;color:var(--gr);margin-top:2px;word-break:break-word}
.mov-row-amt{font-size:13px;font-weight:700;white-space:nowrap}

.mov-empty{padding:18px;text-align:center;color:var(--gr);font-size:12px;font-style:italic}
@media(max-width:680px){.mov-cols{grid-template-columns:1fr;gap:10px}}

/* === Impresión === */
.print-only{display:none}
@media print{
  body{background:#fff!important}
  .no-print, .nav, .sidebar, .header, .greet.no-print, .burger, .drawer-ov{display:none!important}
  .layout, .main, .content{margin:0!important;padding:0!important;max-width:100%!important;width:100%!important;background:#fff!important}
  .print-only{display:block!important}

  .mov-row-amt{font-size:11px}
  .mov-col-head, .mov-col-total{padding:8px 10px;font-size:11px}
  @page{margin:1.2cm;size:A4}
}

async function apiGet(accion, p={}) {
  const url = new URL(CONFIG.API);
  url.searchParams.set('accion', accion);
  url.searchParams.set('token', CONFIG.TOKEN);
  Object.keys(p).forEach(k => url.searchParams.set(k, p[k]));
  try { const r = await fetch(url.toString()); const d = await r.json(); state.online=true; return d; }
  catch (e) { state.online=false; return {ok:false,error:'Sin conexión'}; }
}
async function apiPost(accion, body={}) {
  try { const r = await fetch(CONFIG.API, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({accion,token:CONFIG.TOKEN,...body})}); return await r.json(); }
  catch (e) { return {ok:false,error:e.message}; }
}
function money(n) { if(n===null||n===undefined||isNaN(n))return '$0'; return '$'+Number(n).toLocaleString('es-AR'); }
function toast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.classList.remove('show'),2800); }
function fechaCorta(d){ if(!d)return''; try{ if(typeof d==='string'&&d.includes('T'))return new Date(d).toLocaleDateString('es-AR'); return d; }catch(e){return d;} }

async function cargarDatosBase() {
  const [a, c, av, m] = await Promise.all([apiGet('listar_alquileres'),apiGet('estado_caja'),apiGet('avisos'),apiGet('morosos_top',{cantidad:50})]);
  if(a.ok)state.data.alquileres=a.data||[];
  if(c.ok)state.data.caja=c.data;
  if(av.ok)state.data.avisos=av.data||[];
  if(m.ok)state.data.morosos=m.data||[];
}

// Ver detalle de movimientos (con rango de fechas + 2 columnas + imprimir)
function fechaHoyISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isoADMY(iso){ if(!iso)return ''; const p=iso.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso; }
function dmyAISO(dmy){ if(!dmy)return fechaHoyISO(); const p=String(dmy).split('/'); return p.length===3?`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`:fechaHoyISO(); }
function fechaDeltaDMY(dias){
  const d=new Date(); d.setDate(d.getDate()+dias);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function primerDiaMesDMY(){
  const d=new Date();
  return `01/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

}
function aplicarRangoMov(){
  const isoD = document.getElementById('movDesde').value;
  const isoH = document.getElementById('movHasta').value;
  if(!isoD){toast('Elegí fecha desde','co');return;}
  if(!isoH){ verDetalleDia(isoADMY(isoD)); return; }
  if(isoH < isoD){toast('La fecha "hasta" debe ser posterior a "desde"','co');return;}
  if(isoH === isoD){ verDetalleDia(isoADMY(isoD)); return; }
  verDetalleDia(isoADMY(isoD), isoADMY(isoH));
}
// Compatibilidad con código viejo que llamaba aplicarFechaMov
function aplicarFechaMov(){ aplicarRangoMov(); }

// Generar el texto del ticket (también se usa para compartir WhatsApp)
function ticketCierreTexto(c){
  const dif = Number(c.DIFERENCIA)||0;
  const signoDif = dif===0?'CUADRA':(dif>0?'sobra '+money(dif):'falta '+money(Math.abs(dif)));
  const lineas = [
    '*FERIA DEL LITORAL*',
    '*Cierre de Caja*',
    '─────────────',
    `📅 Fecha: ${c.FECHA||'-'}`,
    `👤 Apertura: ${c.OPERADOR_APERTURA||'-'}`,
    `👤 Cierre: ${c.OPERADOR_CIERRE||'-'}`,
    '─────────────',
    `🔓 Apertura: ${money(c.EFECTIVO_APERTURA)}`,
    `⬆ Ingresos (efectivo): ${money(c.INGRESOS_EFECTIVO||c.TOTAL_INGRESOS)}`,
    `⬇ Egresos (efectivo): ${money(c.EGRESOS_EFECTIVO||c.TOTAL_EGRESOS)}`,
    `🔒 Saldo teórico: ${money(c.SALDO_TEORICO)}`,
    `💵 Efectivo contado: ${money(c.EFECTIVO_CONTADO)}`,
    '─────────────',
    `📊 Diferencia: ${signoDif}`,
    c.MOTIVO_DIFERENCIA ? `📝 Motivo: ${c.MOTIVO_DIFERENCIA}` : '',
    '─────────────',
    `📈 ${c.CANTIDAD_PAGOS||0} pagos · ${c.CANTIDAD_GASTOS||0} gastos${c.CANTIDAD_RETIROS?' · '+c.CANTIDAD_RETIROS+' retiros':''}`,
    c.OBSERVACION ? `💬 ${c.OBSERVACION}` : ''
  ].filter(x=>x);
  return lineas.join('\n');
}

// Convertir dd/MM/yyyy a yyyy-MM-dd para input type="date"
function fechaParaInput(f){
  if(!f)return '';
  if(f.includes('-'))return f;
  const p = f.split('/');
  if(p.length===3)return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return '';
}

async function confCargarContrato(num){
  const nombre = document.getElementById('ctNombre').value.trim();
  const link = document.getElementById('ctLink').value.trim();
  const fechaInicio = document.getElementById('ctIni').value;
  const fechaVenc = document.getElementById('ctVenc').value;
  const notas = document.getElementById('ctNotas').value.trim();
  if(!link && !fechaVenc){toast('Cargá al menos el link o fecha de vencimiento','co');return;}
  toast('Guardando...');
  const r = await apiPost('cargar_contrato',{local:num,nombre,link,fechaInicio,fechaVenc,notas,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Contrato guardado','ve');cerrarModal();if(state.view==='contratos')setTimeout(()=>rContratos(),500);else setTimeout(()=>rLocal(num),500);}
  else toast('Error: '+r.error,'co');
}

async function confBorrarContrato(num){
  if(!confirm('¿Borrar el contrato de este local? Esta acción no se puede deshacer.'))return;
  const r = await apiPost('borrar_contrato',{local:num,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Borrado','ve');cerrarModal();if(state.view==='contratos')setTimeout(()=>rContratos(),500);else setTimeout(()=>rLocal(num),500);}
  else toast('Error: '+r.error,'co');
}

// Modal ajuste manual (acepta campo preseleccionado: 'CAJA' o 'BANCO APROX')
function modAjusteCaja(campoPre){
  const sel = campoPre || 'CAJA';
  const esBanco = sel==='BANCO APROX';
  const opciones = ['CAJA','BANCO APROX','TOTAL GENERAL']
    .map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');
  modal(`
    <h3>${esBanco?'🏦 Ajustar saldo del banco':'✏️ Ajuste manual de saldo'}</h3>
    <div class="alert do" style="margin-bottom:14px"><div class="alert-text">${esBanco?'Ingresá el saldo real del banco (BANCO APROX). Queda registrado en AUDITORIA.':'Usalo para correcciones puntuales. Para arqueo de efectivo diario, usá Cierre de caja. Queda en AUDITORIA.'}</div></div>
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px">Campo a ajustar</label>
    <select id="acCampo">${opciones}</select>
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px;margin-top:6px">Nuevo saldo</label>
    <input type="number" id="acMonto" placeholder="Ej: 7500000">
    <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px;margin-top:6px">Motivo (obligatorio)</label>
    <input type="text" id="acMotivo" placeholder="${esBanco?'Ej: actualicé con el saldo del homebanking':'Ej: corrección, conteo manual'}">
    <button class="btn co" onclick="confAjusteCaja()" style="margin-top:14px">Confirmar ajuste</button>
  `);
}
async function confAjusteCaja(){
  const campo = document.getElementById('acCampo').value;
  const nuevoSaldo = parseFloat(document.getElementById('acMonto').value);
  const motivo = document.getElementById('acMotivo').value.trim();
  if(isNaN(nuevoSaldo)||!motivo){toast('Completá monto y motivo','co');return;}
  if(!confirm(`¿Confirmás ajustar ${campo} a ${money(nuevoSaldo)}?\n\nMotivo: ${motivo}`))return;
  const r = await apiPost('ajustar_caja',{campo,nuevoSaldo,motivo,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Caja ajustada','ve');cerrarModal();setTimeout(()=>rCaja(),500);}
  else toast('Error: '+r.error,'co');
}

// Arma un resumen compacto de la feria para que la IA tenga contexto
function construirContextoIA(){
  const al = state.data.alquileres||[];
  const mor = (state.data.morosos||[]).slice(0,15);
  const caja = state.data.caja||{};
  const tA = al.reduce((s,a)=>s+(Number(a['ALQUILER ACTUAL'])||0),0);
  const tP = al.reduce((s,a)=>s+(Number(a.PAGADO)||0),0);
  const dT = (state.data.morosos||[]).reduce((s,m)=>s+(Number(m['DEUDA TOTAL'])||0),0);
  const alDia = al.filter(a=>a.NOMBRE && Number(a['DEUDA TOTAL']||0)===0).length;
  const activos = al.filter(a=>a.NOMBRE).length;
  const lineasMor = mor.map((m,i)=>`${i+1}. Local ${m.LOCAL} - ${m.NOMBRE}: debe ${money(m['DEUDA TOTAL'])}`).join('\n');
  const cajaTxt = Object.keys(caja).map(k=>`${k}: ${typeof caja[k]==='number'?money(caja[k]):caja[k]}`).join(', ');
  return `DATOS ACTUALES DE FERIA DEL LITORAL (${new Date().toLocaleDateString('es-AR')}):
- Locales activos: ${activos}. Al día (sin deuda): ${alDia}. Con deuda: ${(state.data.morosos||[]).length}.
- Cobranza del mes: cobrado ${money(tP)} de ${money(tA)} esperado (${tA>0?Math.round(tP/tA*100):0}% de cumplimiento).
- Deuda total acumulada: ${money(dT)}.
- Caja: ${cajaTxt||'sin datos'}.
- Top morosos:
${lineasMor||'sin datos'}`;
}

async function chatEnv() {
  const i=document.getElementById('cInput');
  const t=(i?.value||'').trim();
  if(!t)return;
  state.chat.push({role:'user',text:t});
  if(i)i.value='';
  const m=document.getElementById('cMsgs');
  m.innerHTML+=`<div class="msg user">${t}</div>`;
  m.scrollTop=m.scrollHeight;
  // Indicador "pensando"
  const pid='think_'+Date.now();
  m.innerHTML+=`<div class="msg ai" id="${pid}"><span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:middle"></span> Pensando...</div>`;
  m.scrollTop=m.scrollHeight;

  // Asegurar datos base para el contexto
  if(!state.data.alquileres.length || !state.data.morosos.length){ try{await cargarDatosBase();}catch(e){} }

  let respuesta;
  try{
    const sistema = `Sos "EL ENCARGADO", el asistente de Roberto para administrar Feria del Litoral (un paseo de compras con locales en alquiler en Argentina). Respondé en español rioplatense, de forma breve, concreta y práctica, como un buen encargado. Usá los datos que te paso para responder con números reales. Si te preguntan algo que no está en los datos, decílo con honestidad. Montos en pesos argentinos. No inventes locales ni cifras.

${construirContextoIA()}`;
    // Historial reciente (últimos turnos) en formato Claude
    const previos = state.chat.slice(-8, -1).map(x=>({role: x.role==='ai'?'assistant':'user', content: String(x.text).replace(/<[^>]+>/g,' ')}));
    const mensajes = [...previos, {role:'user', content:t}];
    const r = await apiPost('chat',{mensajes, sistema});
    if(r.ok && r.respuesta){
      respuesta = String(r.respuesta).replace(/\n/g,'<br>');
    } else {
      // Fallback: si no hay API key configurada o falla, uso respuestas locales
      const motivo = (r.error||'').toLowerCase().includes('api key') ? '' : ` <em style="font-size:10px;opacity:.6">(modo offline)</em>`;
      respuesta = (await respLoc(t.toLowerCase())) + motivo;
    }
  }catch(e){
    respuesta = await respLoc(t.toLowerCase());
  }

  const think=document.getElementById(pid);
  if(think)think.remove();
  state.chat.push({role:'ai',text:respuesta});
  m.innerHTML+=`<div class="msg ai">${respuesta}</div>`;
  m.scrollTop=m.scrollHeight;
}

// Fallback local (se usa solo si el backend no responde o no hay API key)
async function respLoc(q) {
  if(!state.data.morosos.length)await cargarDatosBase();
  if(q.includes('moroso')||q.includes('debe')){const t=state.data.morosos.slice(0,5);return '🚨 <b>Top 5 morosos:</b><br><br>'+t.map((m,i)=>`${i+1}. <b>${m.NOMBRE}</b><br>   ${money(m['DEUDA TOTAL'])}`).join('<br><br>');}
  if(q.includes('cobra')||q.includes('mes')){const tp=state.data.alquileres.reduce((s,a)=>s+(Number(a.PAGADO)||0),0);const ta=state.data.alquileres.reduce((s,a)=>s+(Number(a['ALQUILER ACTUAL'])||0),0);return `💰 <b>Cobranza:</b><br>Cobrado: ${money(tp)}<br>Esperado: ${money(ta)}<br>Cumplimiento: <b>${ta>0?Math.round(tp/ta*100):0}%</b>`;}
  if(q.includes('caja')){if(!state.data.caja)return 'No hay datos';return '💵 <b>Caja:</b><br>'+Object.keys(state.data.caja).map(k=>`${k}: <b>${typeof state.data.caja[k]==='number'?money(state.data.caja[k]):state.data.caja[k]}</b>`).join('<br>');}
  if(q.includes('día')||q.includes('dia')){const ad=state.data.alquileres.filter(a=>a.NOMBRE&&Number(a['DEUDA TOTAL']||0)===0);return `✅ <b>${ad.length} al día:</b><br><br>`+ad.slice(0,10).map(l=>`• ${l.NOMBRE}`).join('<br>');}
  if(q.includes('promo')){const r=await apiGet('locales_sin_promo');if(r.ok)return `🎯 <b>Promos:</b><br>Con promo: ${r.total_con||0}<br>Sin promo: ${r.total_sin||0}<br><br>Andá a la sección Promos para ver el detalle.`;}
  return 'Probá las preguntas rápidas de arriba 🤖';
}

            {label:'Deuda corriente', data:top10.map(m=>m.deuda-m.mora-m.intereses), backgroundColor:'#3b82f6'}
          ]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>'$'+(v/1000000).toFixed(1)+'M'}}},
          plugins:{legend:{position:'top'}}
        }
      });
    }
    
    // 2. Promos (torta)
    if(pg.ok){
      new Chart(document.getElementById('chPro'), {
        type:'doughnut',
        data:{
          labels:['Con promo','Sin promo'],
          datasets:[{data:[pg.activas, pg.sin_cargar], backgroundColor:['#10b981','#ef4444']}]
        },
        options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}}
      });
    }
    
    // 3. Distribución deuda (torta)
    const d = ag.distribucion_deuda;
    new Chart(document.getElementById('chDis'), {
      type:'pie',
      data:{
        labels:['Al día','Chica (<500k)','Media (500k-1.5M)','Grande (1.5-3M)','Crítica (+3M)'],
        datasets:[{
          data:[d.al_dia, d.chica, d.media, d.grande, d.critica],
          backgroundColor:['#10b981','#84cc16','#fbbf24','#f97316','#ef4444']
        }]
      },
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}
    });
  }, 200);
}

function rCampanias(){

  render(`
    <div class="greet"><h2>📣 Campañas / Eventos</h2><p>Mandar mensaje masivo sobre un evento</p></div>
    <div class="alert do"><div class="alert-title">💡 Cómo funciona</div><div class="alert-text">Escribís el nombre del evento (Día de la Madre, Aniversario, etc) y EL ENCARGADO genera mensajes para todos los locales con tel cargado.</div></div>
    <div class="detail">
      <h3>Configurar campaña</h3>
      <label style="font-size:11px;color:var(--gr);display:block;margin-bottom:4px">Nombre del evento</label>
      <input type="text" id="cpEvento" placeholder="Ej: Día de la Madre, Aniversario Feria, Black Friday">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:14px"><input type="checkbox" id="cpSoloMor"> Solo enviar a locales morosos</label>
      <button class="btn do" onclick="generarCampania()" style="margin-top:14px">📣 Generar mensajes</button>
    </div>
    <div id="cpResult"></div>

async function generarCampania(){
  const evento = document.getElementById('cpEvento').value.trim();
  const soloMor = document.getElementById('cpSoloMor').checked;
  if(!evento){toast('Escribí el evento','co');return;}
  document.getElementById('cpResult').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const r = await apiPost('links_evento',{evento,soloMorosos:soloMor,operador:state.user.name});
  if(!r.ok){document.getElementById('cpResult').innerHTML=`<div class="alert"><div class="alert-text">${r.error}</div></div>`;return;}
  document.getElementById('cpResult').innerHTML=`
    <div class="section" style="margin-top:14px">
      <div class="section-title">✅ ${r.total} mensajes listos</div>
      ${r.data.map(m=>`<div class="mn"><div class="mn-h"><div class="mn-n">Local ${m.local}</div></div><a href="${m.link}" target="_blank" class="btn wa">💬 Mandar</a></div>`).join('')}
    </div>
  `;
}

function modal(html) {
  let m = document.getElementById('modalOverlay');
  if(!m){m=document.createElement('div');m.id='modalOverlay';m.className='modal-overlay';m.onclick=(e)=>{if(e.target===m)cerrarModal();};document.body.appendChild(m);}
  m.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="cerrarModal()">✕</button>${html}</div>`;
  setTimeout(()=>m.classList.add('show'),10);
}
function cerrarModal(){const m=document.getElementById('modalOverlay');if(m)m.classList.remove('show');}

function modPago(num) {
  const l = state.data.alquileres.find(a=>String(a.LOCAL)===String(num));
  modal(`
    <h3>💵 Cargar pago</h3>
    <div style="font-size:13px;color:var(--gr);margin-bottom:14px">Local ${num} · ${l?.NOMBRE||''}</div>
    <input type="number" id="pM" placeholder="Monto">
    <select id="pMet"><option>EFECTIVO</option><option>TRANSFERENCIA</option><option>MERCADOPAGO</option></select>
    <input type="text" id="pObs" placeholder="Observaciones (opcional)">
    <button class="btn do" onclick="confPago(${num})">Confirmar</button>
  `);
}
async function confPago(num) {
  const monto = parseFloat(document.getElementById('pM').value);
  const metodo = document.getElementById('pMet').value;
  const obs = document.getElementById('pObs').value;
  if(!monto||monto<=0){toast('Monto inválido','co');return;}
  toast('Cargando...');
  const r = await apiPost('cargar_pago',{local:num,monto,metodo,observaciones:obs,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Pago cargado','ve');cerrarModal();state.data.alquileres=[];setTimeout(()=>verLocal(num),500);}
  else toast('Error: '+r.error,'co');
}

function modAviso() {
  modal(`
    <h3>📢 Aviso al equipo</h3>
    <textarea id="aT" placeholder="Escribí el aviso..." rows="4" style="resize:none"></textarea>
    <button class="btn do" onclick="confAviso()">Publicar</button>
  `);
}
async function confAviso() {
  const mensaje = document.getElementById('aT').value;
  if(!mensaje){toast('Escribí algo','co');return;}
  const r = await apiPost('cargar_aviso',{mensaje,cargadoPor:state.user.name});
  if(r.ok){toast('✓ Publicado','ve');cerrarModal();}else toast('Error','co');
}
