<!DOCTYPE html>
<html lang="es">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL ENCARGADO v5.0 — Feria del Litoral</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --teal:#0F766E; --teal-d:#0B5953; --teal-l:#5EEAD4;
  --coral:#F97066; --coral-d:#E04E43;
  --sand:#FAF5EC; --sand-d:#F0E6D2;
  --ink:#1F2937; --ink-soft:#4B5563; --muted:#9CA3AF;
  --line:#E5E0D2; --bg:#FBF8F1; --card:#FFFFFF;
  --ok:#16A34A; --warn:#D97706; --danger:#DC2626;
  --shadow:0 4px 14px rgba(15,118,110,.08);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
textarea{resize:vertical;min-height:80px}
a{color:var(--teal);text-decoration:none}
.hidden{display:none!important}

/* ======= LOGIN ======= */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal) 0%,var(--teal-d) 100%);padding:20px}
.login-card{background:#fff;border-radius:20px;padding:36px 30px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.login-card h1{font-size:22px;color:var(--teal);text-align:center;margin-bottom:6px}
.login-card .sub{text-align:center;color:var(--muted);margin-bottom:24px;font-size:13px}
.login-card label{display:block;font-size:12px;color:var(--ink-soft);margin:10px 0 4px;font-weight:600}
.login-card .btn-primary{width:100%;margin-top:18px}
.login-err{background:#FEE2E2;color:var(--danger);padding:8px 12px;border-radius:8px;font-size:13px;margin-top:10px;text-align:center}

/* ======= APP SHELL ======= */
#app{display:none;min-height:100vh}
.shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:var(--teal);color:#fff;padding:18px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar .brand{padding:0 20px 18px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:12px}
.sidebar .brand h2{font-size:17px;letter-spacing:.3px}
.sidebar .brand small{color:var(--teal-l);font-size:11px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#E0F2F1;font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:.15s}
.sidebar nav a:hover{background:rgba(255,255,255,.08)}
.sidebar nav a.active{background:rgba(255,255,255,.14);border-left-color:var(--coral);color:#fff}
.sidebar nav a .ico{width:18px;text-align:center;font-size:15px}
.sidebar .user-box{padding:14px 20px;border-top:1px solid rgba(255,255,255,.15);margin-top:12px;font-size:12px}
.sidebar .user-box .name{font-weight:700;color:#fff}
.sidebar .user-box .role{color:var(--teal-l);font-size:11px}
.sidebar .user-box button{margin-top:8px;color:#fff;font-size:11px;text-decoration:underline;opacity:.85}

main{padding:22px 26px;overflow-x:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:22px;color:var(--ink)}
.topbar .crumbs{color:var(--muted);font-size:12px;margin-top:2px}

/* ======= BOTONES ======= */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-d)}
.btn-coral{background:var(--coral);color:#fff}
.btn-coral:hover{background:var(--coral-d)}
.btn-ghost{background:#fff;color:var(--teal);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--teal);background:var(--sand)}
.btn-danger{background:#fff;color:var(--danger);border-color:#FECACA}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:6px 11px;font-size:12px}

/* ======= CARDS Y LAYOUT ======= */
.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--line)}
.card h3{font-size:15px;margin-bottom:10px;color:var(--teal-d);display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

/* KPI */
.kpi{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--teal)}
.kpi.coral::before{background:var(--coral)}
.kpi.warn::before{background:var(--warn)}
.kpi.ok::before{background:var(--ok)}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.kpi .value{font-size:24px;font-weight:800;color:var(--ink);margin-top:4px}
.kpi .delta{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* TABLA */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 8px;background:var(--sand);color:var(--ink-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 8px;border-bottom:1px solid var(--line)}
.tbl tr:hover{background:var(--sand)}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.badge.ok{background:#DCFCE7;color:#166534}
.badge.warn{background:#FEF3C7;color:#92400E}
.badge.danger{background:#FEE2E2;color:#991B1B}
.badge.info{background:#DBEAFE;color:#1E40AF}
.badge.muted{background:var(--sand-d);color:var(--ink-soft)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;padding:22px;box-shadow:0 25px 60px rgba(0,0,0,.3);position:relative}
.modal h3{color:var(--teal-d);font-size:17px;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
.modal .close-x{position:absolute;top:14px;right:18px;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.modal label{display:block;font-size:12px;color:var(--ink-soft);margin:10px 0 4px;font-weight:600}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid var(--line);padding-top:14px}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;z-index:300;display:none;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:340px}
#toast.ok{background:var(--ok)}
#toast.err{background:var(--danger)}

/* LOADING */
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--sand-d);border-top-color:var(--teal);border-radius:50%;animation:s 1s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.loading-full{padding:40px;text-align:center;color:var(--muted)}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.tabs button{padding:9px 14px;font-size:13px;color:var(--ink-soft);font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.active{color:var(--teal);border-bottom-color:var(--teal)}

/* CHIPS / FILTROS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters .chip{padding:6px 12px;border-radius:99px;background:#fff;border:1px solid var(--line);font-size:12px;cursor:pointer;font-weight:600;color:var(--ink-soft)}
.filters .chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* FICHA LOCAL */
.ficha-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.ficha-head h2{font-size:20px;color:var(--ink)}
.ficha-head .meta{color:var(--muted);font-size:12px;margin-top:3px}

/* CARD EXPANDIBLE (gastos) */
.expand-card{border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;overflow:hidden}
.expand-card .head{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
.expand-card .head:hover{background:var(--sand)}
.expand-card .body{padding:0 14px 14px;border-top:1px solid var(--line);display:none;background:var(--sand)}
.expand-card.open .body{display:block}
.expand-card .kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;font-size:13px;padding-top:12px}
.expand-card .kv dt{font-weight:700;color:var(--ink-soft);font-size:12px}
.expand-card .kv dd{color:var(--ink)}

/* PLANTILLAS */
.plantilla-card{padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;cursor:pointer;transition:.15s}
.plantilla-card:hover{border-color:var(--teal);background:var(--sand)}
.plantilla-card.selected{border-color:var(--teal);background:var(--sand);box-shadow:0 0 0 2px rgba(15,118,110,.15)}
.plantilla-card .nombre{font-weight:700;color:var(--teal-d);font-size:13px}
.plantilla-card .preview{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* CHART CONTAINER */
.chart-box{position:relative;height:280px}
.chart-box.tall{height:340px}

/* RESPONSIVE */
@media(max-width:880px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-260px;width:230px;z-index:100;transition:.25s;height:100vh}
  .sidebar.open{left:0}
  .menu-toggle{display:inline-flex!important}
  main{padding:16px}
  .topbar h1{font-size:18px}
}
.menu-toggle{display:none;background:var(--teal);color:#fff;width:38px;height:38px;border-radius:10px;align-items:center;justify-content:center;font-size:18px}
</style>
</head>
<body>

<!-- ============= LOGIN ============= -->
<div id="login">
  <div class="login-card">
    <h1>EL ENCARGADO</h1>
    <p class="sub">Feria del Litoral — v5.0</p>
    <label>Usuario</label>
    <select id="loginUser">
      <option value="">Seleccionar...</option>
      <option value="roberto">Roberto</option>
      <option value="sebastian">Sebastián</option>
      <option value="fernando">Fernando</option>
      <option value="admin">Admin</option>
    </select>
    <label>Clave</label>
    <input type="password" id="loginPass" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>
    <div id="loginErr" class="login-err hidden"></div>
  </div>
</div>

<!-- ============= APP ============= -->
<div id="app">
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h2>EL ENCARGADO</h2>
      <small>Feria del Litoral · v5.0</small>
    </div>
    <nav>
      <a href="#" data-view="dashboard" class="active"><span class="ico">📊</span> Dashboard</a>
      <a href="#" data-view="locales"><span class="ico">🏪</span> Locales</a>
      <a href="#" data-view="cobranzas"><span class="ico">💰</span> Cobranzas</a>
      <a href="#" data-view="caja"><span class="ico">🧾</span> Caja diaria</a>
      <a href="#" data-view="gastos"><span class="ico">📋</span> Gastos</a>
      <a href="#" data-view="promos"><span class="ico">🎁</span> Promos</a>
      <a href="#" data-view="difundir"><span class="ico">📣</span> Difundir promos</a>
      <a href="#" data-view="eventos"><span class="ico">🎪</span> Campañas/Eventos</a>
      <a href="#" data-view="sugerencias"><span class="ico">✨</span> Sugerencias mix</a>
      <a href="#" data-view="recordatorios"><span class="ico">🔔</span> Recordatorios</a>
      <a href="#" data-view="analisis"><span class="ico">📈</span> Análisis</a>
      <a href="#" data-view="auditoria"><span class="ico">🔍</span> Auditoría</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button onclick="doLogout()">Cerrar sesión</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div>
          <h1 id="viewTitle">Dashboard</h1>
          <div class="crumbs" id="viewSub">Resumen general</div>
        </div>
      </div>
      <div id="topActions"></div>
    </div>

    <div id="content"><div class="loading-full"><span class="spin"></span> Cargando...</div></div>
  </main>
</div>
</div>

<!-- ======= MODAL GENÉRICO ======= -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <span class="close-x" onclick="closeModal()">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* =====================================================
   ESTADO GLOBAL
   ===================================================== */
const State = {
  user:null,
  view:'dashboard',
  cache:{},
  charts:{}
};

const CATS_PLANTILLAS = ['Cobranza','Promo','Evento','Recordatorio','Otros'];

/* =====================================================
   UTILS
   ===================================================== */
function $(id){return document.getElementById(id)}
function toast(msg,kind=''){
  const t=$('toast'); t.textContent=msg; t.className=kind; t.style.display='block';
  setTimeout(()=>t.style.display='none', 3000);
}
function fmt$(n){if(n==null||isNaN(n))return '—';return '$'+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0})}
function fmtDate(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('es-AR')}catch(e){return d}}
function fmtDT(d){if(!d)return '—';try{return new Date(d).toLocaleString('es-AR')}catch(e){return d}}
function esc(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function loading(target){$(target).innerHTML='<div class="loading-full"><span class="spin"></span> Cargando...</div>'}
function openModal(html){$('modalBody').innerHTML=html;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}

function call(fn,...args){
  return new Promise((resolve,reject)=>{
    if(typeof google==='undefined'||!google.script){
      // Modo standalone (sin Apps Script) — devuelve mock vacío para no romper
      console.warn('google.script no disponible, mock vacío para',fn);
      return resolve(null);
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(e=>{toast('Error: '+(e.message||e),'err');reject(e)})
      [fn](...args);
  });
}

/* =====================================================
   LOGIN
   ===================================================== */
async function doLogin(){
  const u=$('loginUser').value, p=$('loginPass').value;
  if(!u||!p){return showLoginErr('Completá usuario y clave')}
  const err=$('loginErr');err.classList.add('hidden');
  try{
    const r=await call('login',u,p);
    if(!r||!r.ok){return showLoginErr(r?.error||'Usuario o clave incorrectos')}
    State.user=r.user;
    $('login').style.display='none';
    $('app').style.display='block';
    $('userName').textContent=r.user.nombre||u;
    $('userRole').textContent=r.user.rol||'Operador';
    bindNav();
    go('dashboard');
  }catch(e){showLoginErr('No se pudo conectar al servidor')}
}
function showLoginErr(m){const e=$('loginErr');e.textContent=m;e.classList.remove('hidden')}
function doLogout(){State.user=null;location.reload()}

/* =====================================================
   NAVEGACIÓN
   ===================================================== */
function bindNav(){
  document.querySelectorAll('.sidebar nav a').forEach(a=>{
    a.onclick=e=>{e.preventDefault();go(a.dataset.view)};
  });
}
const VIEW_META = {
  dashboard:{t:'Dashboard',s:'Resumen general'},
  locales:{t:'Locales',s:'Listado y ficha individual'},
  cobranzas:{t:'Cobranzas',s:'Morosidad y gestión'},
  caja:{t:'Caja diaria',s:'Movimientos del día'},
  gastos:{t:'Gastos',s:'GASTOS2 con detalle completo'},
  promos:{t:'Promos',s:'Promociones activas'},
  difundir:{t:'Difundir promos',s:'Envío masivo por local'},
  eventos:{t:'Campañas y eventos',s:'Notificación masiva'},
  sugerencias:{t:'Sugerencias mix',s:'Análisis de combinación de locales'},
  recordatorios:{t:'Recordatorios enviados',s:'Historial completo'},
  analisis:{t:'Análisis',s:'Gráficos y métricas'},
  auditoria:{t:'Auditoría',s:'Trazabilidad y filtros'}
};
function go(view,param){
  State.view=view;
  document.querySelectorAll('.sidebar nav a').forEach(a=>a.classList.toggle('active',a.dataset.view===view));
  const m=VIEW_META[view]||{t:view,s:''};
  $('viewTitle').textContent=m.t; $('viewSub').textContent=m.s;
  $('topActions').innerHTML='';
  document.getElementById('sidebar').classList.remove('open');
  loading('content');
  RENDER[view] ? RENDER[view](param) : ($('content').innerHTML='<div class="card">Vista no encontrada</div>');
}

/* =====================================================
   RENDERERS POR VISTA
   ===================================================== */
const RENDER = {};

/* ---------- DASHBOARD ---------- */
RENDER.dashboard = async()=>{
  const d = await call('info_local_completa', {dashboard:true}) || {};
  const k = d.kpis || {};
  $('content').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:16px">
      <div class="kpi"><div class="label">Locales activos</div><div class="value">${k.locales_activos||'—'}</div></div>
      <div class="kpi coral"><div class="label">Morosos</div><div class="value">${k.morosos||'—'}</div><div class="delta">${fmt$(k.deuda_total)} total</div></div>
      <div class="kpi ok"><div class="label">Caja del día</div><div class="value">${fmt$(k.caja_dia)}</div></div>
      <div class="kpi warn"><div class="label">Promos activas</div><div class="value">${k.promos_activas||'—'}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <h3>⚡ Accesos rápidos</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
          <button class="btn btn-primary btn-sm" onclick="go('cobranzas')">Ver morosos</button>
          <button class="btn btn-coral btn-sm" onclick="go('difundir')">Difundir promos</button>
          <button class="btn btn-ghost btn-sm" onclick="go('eventos')">Notificar evento</button>
          <button class="btn btn-ghost btn-sm" onclick="openCargarGasto()">Cargar gasto</button>
          <button class="btn btn-ghost btn-sm" onclick="openCierreManual()">Cierre diario</button>
        </div>
      </div>
      <div class="card">
        <h3>📌 Últimos recordatorios</h3>
        <div id="dash-recos"><span class="spin"></span></div>
      </div>
    </div>`;
  // últimos recordatorios mini
  const r = await call('recordatorios',{limit:5}) || [];
  $('dash-recos').innerHTML = (r.length? r.map(x=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:13px">
      <div style="font-weight:600">${esc(x.local||x.destinatario||'—')}</div>
      <div style="color:var(--muted);font-size:11px">${fmtDT(x.fecha)} · ${esc(x.tipo||'—')}</div>
    </div>`).join('') : '<div style="color:var(--muted)">Sin registros</div>');
};

/* ---------- LOCALES ---------- */
RENDER.locales = async()=>{
  const list = await call('info_local_completa',{listado:true}) || [];
  State.cache.locales = list;
  $('topActions').innerHTML = `<input id="qLocal" placeholder="Buscar local..." style="max-width:240px" oninput="filtrarLocales()">`;
  $('content').innerHTML = `
    <div class="card" style="padding:0">
      <table class="tbl" id="tblLocales">
        <thead><tr><th>Local</th><th>Operador</th><th>Estado</th><th>Deuda</th><th></th></tr></thead>
        <tbody>
        ${list.map(l=>`
          <tr data-nombre="${esc((l.nombre||'').toLowerCase())}">
            <td><b>${esc(l.nombre||'—')}</b><div style="font-size:11px;color:var(--muted)">${esc(l.local_id||'')}</div></td>
            <td>${esc(l.operador||'—')}</td>
            <td>${l.activo?'<span class="badge ok">Activo</span>':'<span class="badge muted">Baja</span>'}</td>
            <td>${l.deuda>0?'<span class="badge danger">'+fmt$(l.deuda)+'</span>':'<span class="badge ok">Al día</span>'}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="abrirFicha('${esc(l.local_id||l.nombre)}')">Ver ficha</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
};
function filtrarLocales(){

  document.querySelectorAll('.filters .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#tblRecos tbody tr').forEach(tr=>{
    tr.style.display = (f==='todos'||tr.dataset.tipo===f)?'':'none';
  });
}

/* ---------- ANÁLISIS (Chart.js) ---------- */
RENDER.analisis = async()=>{
  $('content').innerHTML = `
    <div class="grid grid-2" style="margin-bottom:14px">
      <div class="card"><h3>📉 Morosidad (por meses vencidos)</h3><div class="chart-box"><canvas id="chMor"></canvas></div></div>
      <div class="card"><h3>🥧 Promos por rubro</h3><div class="chart-box"><canvas id="chProm"></canvas></div></div>
    </div>
    <div class="card"><h3>💰 Distribución de deuda</h3><div class="chart-box tall"><canvas id="chDeuda"></canvas></div></div>
    <div class="card" style="margin-top:14px"><h3>📌 Resumen general</h3><div id="resumenAnalisis"><span class="spin"></span></div></div>`;
  // Destruir gráficos viejos si los hay
  Object.values(State.charts).forEach(c=>{try{c.destroy()}catch(e){}});
  State.charts={};
  const [mor,prom,gen] = await Promise.all([
    call('morosidad_grafico'),
    call('promos_grafico'),
    call('analisis_general')
  ]);
  // Morosidad — barras
  if(mor && mor.labels){
    State.charts.mor = new Chart($('chMor'),{
      type:'bar',
      data:{labels:mor.labels, datasets:[{label:'Locales', data:mor.data, backgroundColor:'#F97066', borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
    });
  }
  // Promos — torta
  if(prom && prom.labels){
    State.charts.prom = new Chart($('chProm'),{
      type:'doughnut',
      data:{labels:prom.labels, datasets:[{data:prom.data, backgroundColor:['#0F766E','#F97066','#D97706','#5EEAD4','#94A3B8','#1F2937']}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}
    });
  }
  // Deuda — barras horizontales
  if(gen && gen.deuda_distribucion){
    const dd = gen.deuda_distribucion;
    State.charts.deuda = new Chart($('chDeuda'),{
      type:'bar',
      data:{labels:dd.labels, datasets:[{label:'Deuda', data:dd.data, backgroundColor:'#0F766E', borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
    });
  }
  // Resumen
  if(gen){
    $('resumenAnalisis').innerHTML = `
      <div class="grid grid-4">
        <div class="kpi"><div class="label">Total deuda</div><div class="value">${fmt$(gen.deuda_total)}</div></div>
        <div class="kpi ok"><div class="label">Cobrado mes</div><div class="value">${fmt$(gen.cobrado_mes)}</div></div>
        <div class="kpi warn"><div class="label">Promos activas</div><div class="value">${gen.promos_activas||0}</div></div>
        <div class="kpi coral"><div class="label">Tasa morosidad</div><div class="value">${gen.tasa_morosidad||0}%</div></div>
      </div>`;
  }
};

/* ---------- AUDITORÍA ---------- */
RENDER.auditoria = async()=>{
  $('topActions').innerHTML = `
    <input id="auQ" placeholder="Buscar..." style="max-width:200px;display:inline-block" oninput="filtrarAud()">
    <select id="auTipo" onchange="filtrarAud()" style="max-width:160px;display:inline-block;margin-left:6px">
      <option value="">Todos los tipos</option>
      <option>LOGIN</option><option>GASTO</option><option>AJUSTE</option><option>MENSAJE</option>
      <option>CIERRE</option><option>EVENTO</option><option>OTROS</option>
    </select>`;
  const list = await call('auditoria',{}) || [];
  State.cache.auditoria = list;
  $('content').innerHTML = `
    <div class="card" style="padding:0">
      <table class="tbl" id="tblAud">
        <thead><tr><th>Fecha</th><th>Usuario</th><th>Tipo</th><th>Detalle</th></tr></thead>
        <tbody>${renderAudRows(list)}</tbody>
      </table>
    </div>`;
};
function renderAudRows(list){
  return list.length? list.map(a=>`
    <tr data-tipo="${esc((a.tipo||'').toUpperCase())}" data-q="${esc(((a.detalle||'')+' '+(a.usuario||'')).toLowerCase())}">
      <td>${fmtDT(a.fecha)}</td>
      <td>${esc(a.usuario||'—')}</td>
      <td><span class="badge info">${esc(a.tipo||'—')}</span></td>
      <td>${esc(a.detalle||'—')}</td>
    </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">Sin registros</td></tr>';
}
function filtrarAud(){
  const q=($('auQ').value||'').toLowerCase();
  const t=$('auTipo').value;
  document.querySelectorAll('#tblAud tbody tr').forEach(tr=>{
    const okQ = !q || tr.dataset.q.includes(q);
    const okT = !t || tr.dataset.tipo===t;
    tr.style.display = (okQ&&okT)?'':'none';
  });
}
